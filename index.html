{id:"E18",ti:"The Cellar of Famous Labels",b:[9,13],ex:{fastC:1.8,base:.3},once:1,sc:"An estate sale: a collection thick with famous names — Yquem, Cheval Blanc, a suspicious quantity of '61s. Stored, the executor admits with a lawyer's cough, 'under conditions.' The price reflects the cough.",ch:[
 {t:"Buy the lot.",roll:{stat:"half",win:{fx:{Ci:U.ci2},say:"Nine bottles in ten held. The cellar list gains a page that makes sommeliers from other restaurants come in on their days off, just to read it."},lose:{fx:{Ci:-U.ci2},say:"Vinegar with beautiful passports. You keep one dead '61 on the office shelf as a monument to the cough you ignored."}}},
 {t:"Taste three at random first.",gate:{teamLife:40},roll:{stat:"team",win:{fx:{Ci:U.ci2},say:"Your sommelier picks the three like a customs dog. Two sing, one confesses — you buy the singing racks and skip the rest. Craft, applied to shopping."},lose:{fx:{Ci:-U.ci1},say:"The three you opened were the honest ones. The rest had merely learned to stand up straight for visitors."}}},
 {t:"Pass.",say:"Somebody buys it and lists a '61 at a number that makes the papers. You check the auction report for schadenfreude and find the word 'undrinkable.' Warm feeling. Cheap, too."}]},
{id:"E19",ti:"The Lafite, After Hours",b:[9,13],ex:{base:.7},once:1,sc:"You drop by your own restaurant near midnight — no reason, an owner's insomnia — and find the sommeliers around a candle and an open bottle of Château Lafite 1982. Yours. There is a long, beautiful silence in which several careers flash before several eyes.",ch:[
 {t:"Take off your coat and hold out a glass.",fx:{N:U.n2,Ci:-U.ci1},say:"The '82 is everything the books say. Nobody ever steals from you again — not out of fear, but because you are now inside the story instead of above it."},
 {t:"Fire and brimstone.",fx:{N:-U.n2,Ci:.2},say:"Docked wages, a memo, a chill. The cellar is safe forever and slightly haunted. Twice a year, someone very good resigns."},
 {t:"“Decant it properly, at least.” Then leave.",fx:{N:U.n1},say:"You take nothing and give one sentence. It becomes house scripture: the boss knows everything and punishes only carelessness."}]},
{id:"E20",ti:"Sixty Bottles of Selosse",b:[9,13],ex:{base:.9},once:1,sc:"Your most loyal guest — twenty years of Thursdays — wants his 60th birthday here: sixty guests, and sixty bottles of Selosse for the night. The cellar book is consulted. The cellar book says forty-three.",ch:[
 {t:"Hunt the missing seventeen through the trade.",gate:{N:50},roll:{stat:"N",pivot:60,win:{fx:{Ci:-U.ci1,N:U.n2,R:U.r1},say:"Nine phone calls, two favors burned, one sommelier who drives four hours with a car full of straw and champagne. Sixty bottles stand in the cellar like a choir. The birthday enters legend; so, in certain circles, do you."},lose:{fx:{Ci:-U.ci1},say:"Fourteen found, three impossible — Anselme himself has none to give. You confess the arithmetic to the host, who is moved by the receipts of the attempt. Fifty-seven bottles. Nobody counts after the fourth."}}},
 {t:"Counter-propose: forty-three Selosse, then a vertical of something rarer for the last courses.",fx:{R:U.r2,Ci:U.ci1},say:"You build the night as a story instead of a number — Selosse until midnight, then three vintages of a wine even he has never tasted. He toasts 'the house that argued with me and won.'"},
 {t:"Say yes, and quietly slip seventeen ringers into the second half of the night.",roll:{stat:"hidden",win:{fx:{Ci:U.ci2},say:"By bottle thirty, sixty guests could not distinguish Selosse from seawater. The books balance. Your conscience files the matter under 'hospitality.'"},lose:{fx:{R:-U.r3},say:"Guest fourteen is a collector who drinks Selosse the way priests read Latin. He says nothing at the table and everything at his club. The word 'ringer' attaches to your name at exactly the altitude where it echoes."}}}]},
{id:"E21",ti:"The Glitch",b:[9,13],ex:{base:.8},once:1,sc:"The booking system has had what the vendor's email calls 'an incident': every seat, for the entire coming week, has been sold twice. Two hundred and forty confirmed guests per night, one room. The phone has begun to make weather.",ch:[
 {t:"Run double service all week — two seatings, jammed.",roll:{stat:"team",win:{fx:{R:U.r2,Ci:U.ci2,E:-U.e2},say:"Seven nights of controlled sprint. The room turns like a page at 8:45 sharp, and the week enters brigade folklore as 'the double week' — told, forever after, with pride and exaggerated numbers."},lose:{fx:{R:-U.r2,E:-U.e3},say:"Wednesday, the wheels come off between seatings: forty people in coats watching forty people in desserts. The photographs of your queue do numbers."}}},
 {t:"Call half of them, cancel, and offer the truth plus a voucher.",fx:{R:-U.r1,Ci:-U.ci1},say:"A hundred honest phone calls. Most guests are gracious; the ungracious ones were going to be ungracious about something anyway. The vendor's invoice, remarkably, still arrives."},
 {t:"Annex the bar: overflow seatings, five courses, no choices.",gate:{N:45},fx:{Ci:U.ci1,R:U.r1,E:-U.e1},say:"The bar menu — tonight's problem solved with tomorrow's idea — is so good that people start booking the bar on purpose. The glitch accidentally invents your second restaurant."}]},
{id:"E22",ti:"The Collin in the Rayas",b:[9,13],ex:{base:.8},once:1,sc:"You are called to a table wearing the specific face of a maître d' transporting bad news. Your sommelier has poured Ulysse Collin — a full glass of it — into the guest's half-finished Château Rayas. The two wines sit in one bowl, blinking, like strangers married by administrative error.",ch:[
 {t:"“May I? That should be an astonishing cuvée.” Taste it, straight-faced, then comp both bottles.",roll:{stat:"half",win:{fx:{R:U.r2,N:U.n1},say:"You swirl, taste, pronounce it 'ahead of its time.' The guest cries laughing; the table orders the actual Collin to conduct a formal comparison. The sommelier, spared in public, would now walk through fire for you."},lose:{fx:{R:-U.r1,Ci:-U.ci1},say:"The guest is a purist of the unsmiling kind. The joke lands like a corked bottle. You comp everything and mail a genuine apology; the sommelier writes one too, unprompted, which is something salvaged."}}},
 {t:"Formal apology, both bottles replaced, no theater.",fx:{Ci:-U.ci1,N:U.n1},say:"Clean, expensive, correct. Afterwards, in the cellar, you tell the sommelier the only sentence that matters: 'It happens to everyone once. Once.'"},
 {t:"Apologize to the guest, then dress the sommelier down within the room's hearing.",fx:{N:-U.n2,R:U.r1},say:"The guest gets the scalp; the trade gets the story. Sommeliers talk to sommeliers: yours now pour for you carefully, and feel nothing."}]},
{id:"E23",ti:"The Math Olympiad",b:[9,13],ex:{base:.7},once:1,sc:"Your nephew has won the national Math Olympiad — actually won it — and there is, apparently, only one venue on earth worthy of celebrating this: yours. He asks you himself, by phone, with the formal courage of a fifteen-year-old spending social capital he isn't sure he has.",ch:[
 {t:"Close the room on Monday. Full party.",fx:{Ci:-U.ci1,N:U.n2,E:-U.e1},say:"Seventeen teenage mathematicians demolish a tasting menu and explain topology using petit fours. Your nephew glows like a pass light. Somewhere between courses you realize this is the best table you've seated all year, at the worst margin, and that both facts are correct."},
 {t:"The private room, and a cake with his winning proof iced on it.",fx:{N:U.n1},say:"The pâtissier spends two days on the lemma alone. The photo of the cake goes modestly viral among people who understand it and enormously viral among people who don't. Your nephew frames the menu."},
 {t:"Too busy — send a voucher.",fx:{N:-U.n1},say:"The voucher is generous. The family thermometer registers it precisely anyway. Fifteen-year-olds don't ask twice."}]},
{id:"E24",ti:"The Rival on Television",b:[9,13],ex:{highR:1.5,base:.4},once:1,sc:"A rival chef, on a widely watched talk show, spends four full minutes on you: 'overwrought,' 'pretentious,' 'a brand pretending to be a kitchen.' The clip is everywhere by morning. Your phone performs a small ovation of concern.",ch:[
 {t:"Embrace it. Print it on the menu.",roll:{stat:"half",win:{fx:{R:U.r2},say:"Under the signature dish, in small italics: '\"Overwrought and pretentious\" — a colleague.' The room laughs nightly; the clip becomes YOUR marketing; the rival, magnificently, has to watch. Judo, plated."},lose:{fx:{R:-U.r1},say:"The gesture reads as wounded rather than wry — a fine line, printed in the wrong font. You withdraw it after a month, which the rival's next interview notes with relish."}}},
 {t:"Invite him to dinner. Publicly.",fx:{N:U.n1,R:U.r1},say:"He can't decline without looking small, so he comes, and you cook, and photographers wait outside like weather. Whatever he actually thought of the meal, the picture of two chefs laughing over the pass says otherwise, forever."},
 {t:"Silence.",say:"Feuds need two. Yours starves on schedule. His four minutes age into a clip about a man being angry at someone calm."}]},
{id:"E25",ti:"Carte Blanche",b:[9,13],ex:{base:.7},once:1,sc:"After close, a guest lingers — beautiful suit, patient eyes, security pretending to read the wine list. He proposes, warmly, a restaurant together: any city, any budget, carte blanche. You recognize him. Everyone in this country would recognize him. His business is not restaurants; restaurants are where his business has dinner.",ch:[
 {t:"Decline — with exquisite, unmistakable politeness.",fx:{R:U.r1},say:"'I'm flattered. My name is the only thing I own outright, and I've promised it to no one.' He studies you, then nods, almost pleased — men like him prefer a clean refusal to a dirty partnership. He remains a generous guest. You remain only that: his host."},
 {t:"Accept.",fx:{Ci:U.ci3},roll:{stat:"hidden",win:{say:"The room is the most beautiful thing you have ever opened; the money never once arrives late or asks questions. You stop wondering aloud where it goes at night. Wondering silently continues, off the books, like everything else."},lose:{fx:{R:-U.r3,Ci:-U.ci2},say:"Three years in: a dawn raid, a frozen account, your face on page one beside a word you'd only ever heard in films. The food, one columnist notes, was genuinely excellent — printed as an obituary prints a hobby."}}},
 {t:"Counter-offer: you'll teach his home cook. Privately.",fx:{N:U.n2},say:"Six Sundays in the most secure kitchen you've ever seasoned. His mother's recipes, upgraded with respect. You now have a friend it is unwise to ever need — and a standing table's worth of goodwill that costs you nothing but Sundays."}]},
{id:"E26",ti:"The Strings",b:[9,13],ex:{base:.8},ga:{flag:"DANE"},once:1,sc:"The Dane's money has been quiet for years — so quiet you'd stopped listening. Then a courier envelope, heavy paper: he is 'exercising his advisory rights' on your next opening. A list follows. A designer. A location. A concept, with a trademark symbol. The napkin, it turns out, had small print.",ch:[
 {t:"Buy him out — whatever it costs.",fx:{Ci:-U.ci3,flag:"INDEPENDENT",R:U.r1},say:"The number makes your accountant leave the room to laugh privately. But the name over the door goes back to owning itself, and the trade papers write the sentence you paid for: 'sole proprietor, again.'"},
 {t:"Negotiate: he keeps the money, loses the adjectives.",roll:{stat:"N",pivot:65,win:{fx:{N:U.n1},say:"Two dinners, one lawyer each, a truce drafted on the second tablecloth: his capital, your kitchen, a wall between them with a door only you hold the key to. The Dane respects a good contract the way chefs respect a good knife."},lose:{fx:{R:-U.r1},say:"The negotiation leaks. 'CHEF AT WAR WITH BACKER' is not a headline that seats tables. You settle for a concept 'consultation' that consumes a season of Tuesdays."}}},
 {t:"Take the list. Open his restaurant.",fx:{Ci:U.ci2,R:-U.r1},say:"It's handsome, profitable, and precisely nothing to do with you — a room wearing your name like a rented suit. It makes money the way strangers make small talk. You visit twice a year, as agreed, in writing."}]},
/* ---- BAND F : the empire ---- */
{id:"F1",ti:"The Time Zones",b:[11,13],ex:{base:1},ga:{far:1},once:1,sc:"3 a.m. is now a place you visit weekly. New York closes as you wake; someone always needs a decision at the exact hour you're worst at making them.",ch:[
 {t:"Build the ops layer.",fx:{Ci:-U.ci2,mod:"opsLayer"},say:"Systems. Dashboards. Distance, partially refunded."},
 {t:"Fly there quarterly.",fx:{mod:"flyer"},say:"You, in person, still works. On you, it doesn't."}]},
{id:"F2",ti:"The Brand Deal",b:[11,13],ex:{highR:2},once:1,sc:"A cookware line with your name in a serif font. The money is absurd. The pans, you suspect from the samples, are adequate.",ch:[
 {t:"Sign.",fx:{Ci:U.ci3},roll:{stat:"hidden",win:{say:"The pans hold. The money holds better."},lose:{fx:{R:-U.r2},say:"The pans warp. The joke follows you."}}},
 {t:"Decline.",fx:{R:U.r1},say:"The people whose opinion is your actual asset — they notice."}]},
{id:"F3",ti:"The Documentary",b:[11,13],ex:{highR:2},once:1,sc:"A crew, a director with theories about “fire as memory,” lights in your first kitchen.",ch:[
 {t:"Let them in.",fx:{R:U.r2,E:-U.e1,S:-U.s1},roll:{stat:"half",win:{fx:{R:U.r2},say:"The edit is kind. Bookings triple on three continents."},lose:{fx:{R:-U.r1},say:"They found the pan-throwing footage. Even bad fame seats covers."}}},
 {t:"No cameras.",say:"The fire keeps its memories."}]},
{id:"F4",ti:"London Goes Rogue",b:[11,13],ex:{lowMQ:2},ga:{london:1},sc:"Your London head chef gives an interview containing the phrase “creative differences” and the word “franchise,” in quotation marks that drip.",ch:[
 {t:"Fire him before print.",fx:{MQ:-U.s2,Ci:-U.ci1},say:"Clean, fast, expensive. The kitchen resets."},
 {t:"Fly over. Close the door. Repair it.",fx:{E:-U.e2},roll:{stat:"N",pivot:65,win:{fx:{MQ:U.s2*2},say:"Two hours, one bottle, zero journalists. Fixed."},lose:{fx:{R:-U.r2},say:"The divorce goes public anyway. London reads everything."}}},
 {t:"Stay above it.",fx:{R:-U.r1},say:"“Above it” reads as “absent” in 72-point type."}]},
{id:"F5",ti:"When Did You Last Work a Service?",b:[11,13],ex:{rust:2.5},sc:"A line cook in your own flagship asks it without malice, which is worse.",ch:[
 {t:"Work the line for a week, unannounced.",fx:{S:U.s2,E:-U.e1,R:U.r2},say:"The press cannot resist it — and for once the story is true."},
 {t:"Laugh it off.",say:"The question doesn't repeat. Which is also an answer."}]},
{id:"F6",ti:"The Old Man's Funeral",b:[11,13],ex:{base:.6},once:1,sc:"Chef Brasse, who threw pans at you for two years and taught you everything the pans were about, is dead at ninety-one. The funeral lunch needs cooking.",scAlt:{BRASSE_DEBT:"Chef Brasse is dead at ninety-one. The funeral lunch needs cooking — and you know exactly what he'd want served. He showed you, that Sunday."},ch:[
 {t:"Cook it yourself.",say:"Whites, pressed. No cameras. The best service you ever run has forty covers and no menu."},
 {t:"Send your best people.",say:"You realize, mid-flight to somewhere, that you never once cooked for him."}]},
{id:"F7",ti:"The Succession Question",b:[11,13],ex:{base:.8},once:1,sc:"An interviewer asks it plainly: after you, what is all this?",ch:[
 {t:"Name Tomas.",gate:{flag:"TOMAS"},fx:{prot:4,R:U.r1},say:"The empire acquires a future tense. He calls you that evening and says nothing much, which says everything."},
 {t:"Name no one.",fx:{R:-U.r1},say:"The empire acquires a bus-factor."},
 {t:"“The name is the succession.”",fx:{flag:"ALL_IN"},say:"The brand outlives the cook. Or doesn't."}]},
{id:"F8",ti:"The Exit",b:[11,13],ex:{fastC:1.5,base:.4},once:1,sc:"Private equity, a data room, a multiple of earnings that makes your accountant use the word “frankly.”",ch:[
 {t:"Sell everything.",fx:{ending:"EXIT"},say:""},
 {t:"Refuse.",fx:{flag:"ALL_IN"},say:"You will die in whites, one way or another."}]},
{id:"F9",ti:"The Kitchen That Doesn't Need You",b:[11,13],ex:{highMQ:2.5},once:1,sc:"You land unannounced, braced for the usual list, and find… nothing on it. The pass runs clean. The fish is right. A cook you've never met corrects a plate exactly the way you would have — with your own words, which apparently now travel without you.",ch:[
 {t:"Stay for service, a guest in your own house.",fx:{R:U.r1,E:U.e1,prot:1},say:"You eat at the counter. Someone else's kitchen. Yours."},
 {t:"Leave before they see you.",say:"A strange lightness, unpriced."}]},
{id:"F10",ti:"The Airport Question",b:[11,13],ex:{base:.8},sc:"A stranger at gate B44 asks if you're you, and then, kindly, whether the São Paulo one is “real — you know, real real.”",ch:[
 {t:"“I choose every menu myself.” (true-ish)",roll:{stat:"half",win:{fx:{R:U.r1},say:"He beams. True-ish held, this time."},lose:{fx:{R:-U.r1},say:"His nephew works in the São Paulo kitchen. Ah."}}},
 {t:"“It's real if the cooking's real.”",fx:{R:U.r1},say:"It quotes well. You half believe it."}]},
{id:"F11",ti:"The Imposter",b:[11,13],ex:{highR:1.5,base:.5},sc:"A man is touring provincial towns doing paid cooking demonstrations as you. The photographs show a gentleman with your haircut and, apparently, great confidence in béchamel.",ch:[
 {t:"Lawyers.",fx:{Ci:-U.ci1},say:"He is stopped. In his last interview as you, he thanks the towns for their warmth. The warmth was real, which is the strange part."},
 {t:"Ignore him.",say:"He retires undefeated somewhere near the border. To this day, in certain villages, your béchamel is remembered fondly."},
 {t:"Send him a signed apron.",fx:{R:U.r2},say:"The story runs everywhere. 'CHEF ADOPTS OWN IMPOSTER.' Unbuyable press, purchased with one apron."}]},
{id:"F12",ti:"The Earthquake",b:[11,13],ex:{base:.8},ga:{far:1},once:1,sc:"An earthquake, forty kilometers from the city where you opened your last restaurant. Your kitchen there stands; whole streets nearby do not. The phone starts before dawn — staff first, then journalists, in that order if you're lucky.",ch:[
 {t:"Fly in. Turn the restaurant into a relief kitchen.",fx:{E:-U.e2,R:U.r2,N:U.n2},say:"Two weeks of rice, stew, and no menus. Your cooks work like people who remember why they started. Years later, locals still call it 'the kitchen that stayed open.'"},
 {t:"Fund quietly, no cameras.",fx:{Ci:-U.ci2,N:U.n1},say:"Wire transfers have no press office. The mayor knows, the crews know, and one grandmother sends a letter you keep in the knife drawer."},
 {t:"The televised gala.",fx:{Ci:U.ci1,R:U.r1},roll:{stat:"hidden",win:{say:"Eleven chefs, one night, a very large number on an oversized cheque. Cynics mutter; the number builds a school."},lose:{fx:{R:-U.r2},say:"A backstage photo of the gala's champagne pyramid runs beside a photo of the rubble. The caption does not need writing."}}}]},
{id:"F13",ti:"The Credit Crunch",b:[11,13],ex:{base:.9},ga:{far:1},once:1,sc:"A credit crunch in the country of your farthest kitchen. The currency folds like a bad soufflé; the two stars still shine but the room is half ghosts, and every month the place drinks money.",ch:[
 {t:"Subsidize it through the storm.",fx:{Ci:-U.ci3,MQ:U.s2},say:"You pay the winter's bills from summer's pocket. The staff stays whole, the standard stays up, and when the economy turns, you own the only great room left standing."},
 {t:"Cut it to the bone.",fx:{Ci:-.3,MQ:-U.s2,mod:"scandalWorse"},say:"Cheaper fish, thinner brigade, longer shadows. The stars have not noticed yet. Yet is a schedule, not a reprieve."},
 {t:"Sell the outpost, orderly and whole.",fx:{sell:1,R:-U.r1},say:"A local group buys it with the recipes and most of the staff. The papers call it a retreat. Your accountant calls it Tuesday. Both are right."}]},
{id:"F14",ti:"The Office",b:[10,13],ex:{lowE:1.5,base:.4},once:1,sc:"A day of paper cuts: a lease, a lawyer, a leak to the press. At six o'clock you shout at your PA about a calendar clash that is not her fault. She shouts back — accurately, in complete sentences, with dates. The office goes very quiet around two people breathing.",ch:[
 {t:"Apologize first, before service, in front of the calendar.",fx:{N:U.n2},say:"'You were right, and I was loud.' She accepts with the professional grace of someone who has already drafted three resignation letters this year and sent none. The office exhales."},
 {t:"Give her the authority she was actually asking for.",fx:{N:U.n2,E:U.e1},say:"The shouting, decoded, was a job description. She takes over the calendar entirely; two weeks later you notice you've stopped dreading Mondays and can't immediately say why."},
 {t:"Let it blow over.",fx:{N:-U.n1},say:"It doesn't blow over; it settles, like ash. The office cools by two degrees and stays there. She's flawless and distant, which is the expensive kind of flawless."}]},
{id:"F15",ti:"Get Me Out of Here",b:[11,13],ex:{highR:1.5,base:.4},once:1,sc:"An invitation, on production-company letterhead thick as a menu: the next season of 'I'm a Celebrity… Get Me Out of Here.' The fee has a comma in a place you respect. The jungle has insects in places you don't.",ch:[
 {t:"Accept.",fx:{Ci:U.ci3,R:-U.r2,E:-U.e2},say:"Six weeks of rice, beans, and a soap star weeping into your only pot. The nation adores you; the guides do not watch television. The fee builds a kitchen. The clips outlive everyone in them."},
 {t:"Negotiate: you'll judge the cooking trial, one episode, no insects.",roll:{stat:"N",pivot:60,win:{fx:{Ci:U.ci1,R:U.r1},say:"One dignified cameo: you taste a camp stew, say something kind and true, and leave by helicopter. The internet declares you 'weirdly soothing.' Best day-rate of your career."},lose:{fx:{R:-U.r1},say:"The edit keeps your one raised eyebrow and builds a villain from it. Twelve seconds of footage, eighteen months of being 'the eyebrow chef' in comment sections."}}},
 {t:"Decline.",fx:{R:U.r1},say:"The refusal leaks, as refusals do, and burnishes quietly. Somewhere a rival chef says yes and eats a spider on camera; you send him a case of wine with a card that says only: 'Bon appétit.'"}]},
{id:"F16",ti:"Dubai, Dry",b:[11,13],ex:{base:.8},once:1,sc:"The proposal is gold-leafed: a flagship in Dubai, a room like the inside of a diamond, your name in two alphabets. The catch arrives on page nine, politely: no liquor license can be promised. A wine program of zero. The margin does the arithmetic and lies down.",ch:[
 {t:"Accept. The glamor is the point.",fx:{R:U.r2,Ci:-U.ci2},say:"The room photographs like scripture and appears in every magazine that matters. It also loses money with quiet, five-star consistency — a beautiful advertisement you pay for monthly. Everyone assumes it's a triumph, which was, arguably, the purchase."},
 {t:"Decline.",say:"The tower finds another name for its two alphabets. Your accountant sends a one-line email: 'good.' Nothing is gained, nothing is lost; some doors are just corridors."},
 {t:"Counter: yes, contingent on the license, in writing.",roll:{stat:"N",pivot:65,win:{fx:{R:U.r1,Ci:U.ci1},say:"Eight months of paperwork later, an exception materializes the way exceptions do in cities built on them. The room opens with a cellar, a margin, and your name earning instead of spending."},lose:{say:"The contingency dies in a ministry, without drama, like most contingencies. The deal evaporates politely. You keep the gold-leafed brochure for the office wall, filed under 'almost.'"}}}]},
{id:"F17",ti:"The Dream Within the Dream",b:[11,13],ex:{rust:1.5,base:.5},once:1,sc:"You dream you wake — and in the dream you wake in your flagship, mid-afternoon light, every table set, every glass polished, and no one there. Not empty like Monday. Empty like after. You walk the whole room hearing only your own shoes. Then you wake in fact, in a hotel, in a city you have to think for a moment to name.",ch:[
 {t:"Take it as a sign. Fly home. Work the flagship for a week.",fx:{S:U.s1,E:-U.e1,R:U.r1},say:"The room, in waking life, is loud and warm and needs you for nothing — which turns out to be the cure. You cook all week anyway. The dream doesn't come back. Some signs just want acknowledging in person."},
 {t:"Jet lag. It was jet lag.",fx:{E:U.e1},say:"You sleep it off and name the city without hesitation by Thursday. The dream files itself away — though once a year or so, in a quiet dining room at the wrong hour, you hear your own shoes."}]},
/* ---- BAND G : universal ---- */
{id:"G8",ti:"The Old Address",b:[5,13],ex:{base:.5},once:1,sc:"You happen down the street of your first kitchen. The restaurant is gone; it is a phone shop now. Through the window, where the pass used to be, a display case of chargers.",ch:[
 {t:"Go in. Stand where the pass was.",fx:{E:U.e1},say:"A teenager asks if you need help. You do not say: I learned everything here. You say: just looking."},
 {t:"Walk on.",say:"Kitchens don't haunt buildings. They haunt people."}]},
{id:"G9",ti:"The Flirt",b:[0,13],ex:{base:.6},alt:["Another one. It must be the forearms; it is always, apparently, the forearms.","It happens again, years on. You are older now; the compliment lands differently — softer, and somehow more expensive."],sc:"One of the guests flirts with you, unashamedly, in front of God and the maître d'. The kitchen door is right there. So, unfortunately, is your face, doing things.",ch:[
 {t:"Flirt back.",roll:{stat:"half",win:{fx:{N:U.n1,E:U.e1},say:"A drink after close, a laugh that costs nothing, a good story with no third act. Some evenings are complete in one scene."},lose:{fx:{E:-U.e1},say:"It gets complicated by Thursday, as these things do. The kitchen watches the whole opera through the porthole, sharing popcorn."}}},
 {t:"The professional smile.",say:"Warm, brief, bulletproof. The kitchen is a monastery with knives; you took certain vows."}]},
{id:"G10",ti:"No Turbot",b:[5,10],ex:{base:.8},sc:"No turbot on the morning van. A shrug from the driver, a shortage up the coast — and turbot is, this season, the only word half the bookings know.",ch:[
 {t:"Brill, renamed nothing, explained proudly.",roll:{stat:"S",pivot:55,win:{fx:{S:U.s1,R:U.r1},say:"You cook the brill like it owes you turbot money. Two regulars declare it better. The fishmonger, told this, laughs for a week."},lose:{fx:{R:-U.r1},say:"'It's not turbot,' says a man who ordered it specifically to say that. No, sir. It is not."}}},
 {t:"Eighty-six it and face the room.",fx:{R:-U.r1},say:"Honesty at the door, disappointment at six tables, respect at two of them. Acceptable exchange rate, some nights."},
 {t:"Send someone to fight for the last box at the market.",gate:{N:35},fx:{Ci:-.4,N:U.n1},say:"Your name, shouted across the fish market at 5 a.m. by a commis with cash, turns out to open boxes. Everything costs; this cost less."}]},
{id:"G11",ti:"The Napkin Holder",b:[0,13],ex:{base:.5},once:1,sc:"Through the pass you watch a guest — good suit, better watch — slip a silver napkin holder into his pocket with the serenity of a man collecting what he is owed.",ch:[
 {t:"Have it gift-wrapped and presented at the door.",roll:{stat:"half",win:{fx:{R:U.r2},say:"'Sir forgot to let us wrap it.' He goes white, then crimson, then — to his credit — bursts out laughing and books for next month. The story enters the permanent collection."},lose:{fx:{R:-U.r1},say:"He does not laugh. Some men would rather be thieves than be caught being funny. The letter his lawyer sends is itself worth framing."}}},
 {t:"Say nothing.",say:"Hospitality includes a certain amount of silverware amnesty. You price it in, like weather."},
 {t:"Add it to his bill: 'napkin holder, 1.'",fx:{Ci:.2},say:"He pays without a word, which is the most expensive silence available to him."}]},
{id:"G12",ti:"The Burial",b:[0,13],ex:{base:.6},once:1,sc:"A phone call at an hour that only ever means one thing. A death in the family. The burial is set — the same night as the biggest service of the season, the one with your name against it. Both facts sit on the table and do not negotiate with each other.",ch:[
 {t:"Go. Always go.",fx:{E:-U.e1,N:U.n1},roll:{stat:"team",win:{say:"The kitchen closes around your absence like water. Service holds. You stand where you should stand, and someone else stands where you usually do — which is, you realize at the graveside, the whole point of everything you've built."},lose:{fx:{R:-U.r1},say:"Service wobbles without you; a review notices; the number in the ledger dips. Standing at the graveside, you find you cannot make yourself care, and you file that feeling somewhere important."}}},
 {t:"Cook the banquet. Miss the burial.",fx:{R:U.r1},say:"The service is flawless. Everyone says so. You send flowers, and a letter you rewrite four times. There are kitchens in which this was the only possible choice; you will spend certain quiet Sundays wondering if yours had to be one of them."}]},
{id:"G13",ti:"Someone",b:[2,13],ex:{base:.5},once:1,sc:"At a wedding you catered, or the bar after close, or the market at six — the where changes in the retelling. What doesn't change: someone laughs at the thing you said, holds the look one beat past politeness, and writes a number on the back of a receipt. The receipt is in your apron pocket. The schedule, as ever, is against everything.",ch:[
 {t:"Call. Let it become something.",fx:{flag:"HOME",E:U.e1},say:"It becomes something. The schedule now has a rival, and loses gracefully more often than you'd have bet. There is a light on when you get home — the single most expensive luxury in this trade, and the cheapest."},
 {t:"The kitchen is a jealous house.",say:"The receipt survives three washes, fading like the option itself. Years later you find you still know the number, which is its own kind of answer."}]},
{id:"G14",ti:"The Anniversary",b:[2,13],ex:{noRest:1.5,base:.3},ga:{flag:"HOME"},once:1,sc:"An anniversary — the real kind, the one with a date only two people know. It falls, of course, on the loudest Saturday of the season. The empty chair of years past clears its throat. This time, the choice has a name in it.",ch:[
 {t:"Hand the pass over. Go home. Cook for two.",fx:{E:U.e1,N:U.n1},say:"Two covers, one small kitchen, the hardest table you'll ever cook: someone who knows all your tells and orders honesty. The Saturday survives without you — they always could, you just never let them prove it."},
 {t:"The season argues, and wins.",fx:{R:U.r1},say:"Service is flawless. You bring home the good leftovers and a speech that dies in the doorway at the sight of two plates, one used, washed and drying. Nothing is said. Everything is filed."}]},
{id:"G2",ti:"The Doctor",b:[0,13],ex:{trigger:1},once:1,sc:"“Your bloodwork reads like a man twenty years older. I'll say this once.”",ch:[
 {t:"Take a season fully off.",fx:{skipTurn:1},say:"The kitchen survives without you, which is terrible and fine."},
 {t:"“After the season.”",fx:{mod:"setbackWorse"},say:"There is always a season."}]},
{id:"G3",ti:"The Dinner You Missed",b:[0,13],ex:{noRest:1.2},alt:["Another chair, another table, another apology sent by text from the walk-in.","You stopped counting the missed ones. Someone else hasn't."],sc:"A birthday, a school thing, an anniversary — the empty chair at it was yours.",ch:[
 {t:"(There is nothing to decide. There was, earlier.)",say:"The game prices everything else. This it only shows."}]},
{id:"G4",ti:"A Good Day",b:[0,13],ex:{base:.3},alt:["Another good day. They arrive without pattern, like inheritances.","The kind of service where the printer sounds like applause. Nothing happens, perfectly."],sc:"The fish is perfect, the brigade is laughing, service lands like weather. Nothing happens.",ch:[
 {t:"Nothing happens.",say:"It's the day you'll remember when someone asks why you do this."}]},
{id:"G5",ti:"Flu Season",b:[0,13],ex:{base:.35},sc:"Half the city is coughing. Next turn will run heavy — plan for it.",ch:[
 {t:"Noted.",fx:{mod:"fluNext"},say:"Forewarned is half-rested."}]},
{id:"G6",ti:"Marguerite, Again",b:[2,13],ex:{base:.5},once:1,ga:{flag:"MARG"},sc:"Her career runs beside yours like a train on the adjacent track. Sometimes she writes. You always mean to answer.",ch:[
 {t:"Answer her letter.",fx:{N:U.n1},say:"Forty years of parallel lines, one bridge."},
 {t:"Mean to.",say:"The letter stays in the drawer with the good pens."}]},
{id:"G7",ti:"The Knife",b:[4,13],ex:{base:.4},once:1,sc:"Ilya's knife — his second-best, the note said, though you've since learned it was his best — has been sharpened past its life. The steel is thin as a promise.",ch:[
 {t:"Restore it. There's a man who can. There's always one man who can.",fx:{Ci:-.4,S:U.s1},say:"An edge remembers."},
 {t:"Buy the new German thing.",fx:{Ci:-.4},say:"The drawer keeps the old one anyway. Drawers understand."}]},
];

/* ============ PROMOTIONS ============ */
const PROMOS=[
 null,

 {ti:"Apprentice",sc:"Ilya leaves for a ship's kitchen. On your shelf, wrapped in a side towel: his second-best knife. “You wash in the right order now,” the note says. It is the entire note."},
 {ti:"Commis",sc:"A station of your own. It is the garnish station. It is the least station that exists. It is YOURS, and you clean it like a reliquary."},
 {ti:"Demi chef de partie",sc:"The demi walks out mid-service on a Wednesday. You cover the sauces without being asked. Thursday, the schedule has your name where his was. Nobody says anything, which is how kitchens promote."},
 {ti:"Chef de partie",sc:"“The fish is yours,” the chef says — which, in this language, is a knighthood."},
 {ti:"Sous chef",sc:"The chef's knee is worse than he admits. Tuesdays, you run the pass. Then Tuesdays and Fridays. The word 'sous' arrives on the schedule about a month after the fact of it."},
 {ti:"Head chef",sc:"An owner who has eaten your food for years makes you the gamble of his life over a handshake and a bad coffee.",scAlt:{BRASSE_DEBT:"The Old Man calls in the middle of the afternoon. “The Belrose. Their chef walked out mid-service, the idiot. I told them there's only one name worth calling. Don't embarrass me.”"}},
 {ti:"Executive chef",sc:"The group. The suits. The laminated org chart. Your whites now have your name embroidered on them — which is what they do to you when you stop needing whites."},

/* ============ ENDINGS ============ */
const ENDINGS={
 legacy(g){
  const r=g.rung, s=stars(g);
  if(r<=1) return["The Plonge","Forty years of clean plates. Every meal in that room passed through your hands twice. Nobody writes about the plonge. The plonge does not care."];
  if(r<=6) return["The Brigade","You were the reliable station, the safe pair of hands, the one the young ones asked. There are worse epitaphs than 'taught people'."];
  if(r<=8) return["The Pass","Head chef. Your menu, your brigade, your Saturdays. The name over the door was never yours — but the food always was."];
  if(r<=10) return s?["The Starred","The plaque by the door is small. The years it cost are not."]:["The Neighborhood Table","A full room of regulars is a currency the guides don't count. You counted it nightly."];
  if(r<=12) return["The Name Abroad","Your name is cooked nightly in cities you visit quarterly. Whether it tastes like you is a question you've learned not to ask on Sundays."];
  return g.flags.TOMAS?["The Name on Three Continents","An empire with a future tense: somewhere in it, right now, someone you trained is training someone. That's the whole recipe."]:
   ["The Name on Three Continents","The brand outlives the cook. You tell yourself that's the plan, in the plural rooms of the singular name."];
 },
 EXIT:["The Exit","The number was real. The beach is real. At 6 a.m. — every 6 a.m. — your hands still wake before you do, reaching for a knife that isn't there."],
 RUIN_DEBT:["The Receivers","The men who count things arrive on a Tuesday, which at least was always quiet."],
 RUIN_SCANDAL:["The Cascade","The first review was survivable. It was the fourth kitchen you hadn't visited in a year that finished it. The name did travel, in the end — just ahead of you, and worse."],
 RUIN_BODY:["The Body","The doctor gets the last line: “I did say I'd only say it once.”"]
};
const QUIET=["Service passes. The printer sleeps.","A quiet season. The stocks reduce; so do you.","Nothing breaks. In this trade, that's a headline.","The season turns. Somewhere, a menu changes with it.","Plates out, plates back. The old rhythm holds."];

/* ============ STATE ============ */
let g=null;
function newGame(){
 g={S:12,R:5,N:5,E:80,C:2,rung:0,turn:0,onRung:0,ventures:[],nextExp:0,betWait:0,
   prot:0,teamLife:0,flags:{},seen:{},mods:{},setbacks:0,scandals:0,
   alloc:{craft:0,rep:0,cap:0,team:0,rest:0},pendingBet:null,pendingStage2:null,
   skipNext:false,ended:null,dismissedOppo:-1,jit:{}};
 for(const e of EVENTS)g.jit[e.id]=(Math.random()*1.2-0.6);
 save();
}
const stars=st=>st.ventures.reduce((a,v)=>a+v.stars,0);
const budget=()=>CFG.budget+(g.rung>=8?CFG.execBonus:0)+(g.rung>=11?CFG.londonBonus:0);
function income(){
 const repf=.5+g.R/100, skf=.6+.4*g.S/100;
 let inc=CFG.wages[Math.min(g.rung,8)]*repf*skf;
 for(const v of g.ventures) inc+=CFG.ventureInc*v.market*(v.mq/100)*repf*Math.pow(CFG.starIncMult,v.stars);

function applyLevers(){

 g.teamLife+=a.team;
 if(a.rest){g.E=Math.min(100,g.E+a.rest*CFG.restGain);res.push(["info",`☕ Rest: energy +${a.rest*CFG.restGain}`]);}

  if(sLoss>=.4)res.push(["info",`🧂 The hands dull a touch (−${sLoss.toFixed(1)}) — you don't cook enough anymore.`]);}
 for(const v of g.ventures){

 if(g.mods.fluNext){drain*=2;delete g.mods.fluNext;res.push(["bad","🤧 Flu season bites. Half the brigade is coughing; you cover the gaps."]);}
 g.E-=drain;
 res.push(["info",`🕯️ The season takes its toll: energy −${drain.toFixed(0)}.`]);
 if(g.E<=0){

function hazards(res){

function michelin(queue){
 if(g.turn%2||!g.ventures.length)return;
 for(const v of g.ventures){
  if(v.stars>=3||v.mq<50)continue;
  const p=sig(CFG.starInt-CFG.starEsc*v.stars+(v.starMod||0)+CFG.starWS*g.S/100+CFG.starWMQ*v.mq/100+CFG.starWR*g.R/100);
  if(Math.random()<p){v.stars++;g.R=Math.min(100,g.R+CFG.starRep);
   queue.push({type:"star",v:v.name,n:v.stars});}
 }

function promotion(queue){
 if(g.rung>=8||g.onRung<CFG.promoMin)return;
 const thr=CFG.promoSkill[g.rung];if(g.S<thr)return;
 let logit=CFG.promoInt+CFG.promoWS*(g.S-thr)/30+CFG.promoWR*g.R/100+CFG.promoWN*g.N/100;
 if(g.mods.promoBonus){logit+=1;}
 if(Math.random()<sig(logit)){delete g.mods.promoBonus;g.rung++;g.onRung=0;queue.push({type:"promo",r:g.rung});}

/* ============ EVENT SELECTION ============ */
function terms(){
 const mqs=g.ventures.map(v=>v.mq);
 return{base:1,lowE:1-g.E/100,highR:g.R/100,fastC:g._growth||0,
  lowC:g.rung<5?Math.max(0,(20-g.C)/20):0,
  lowMQ:mqs.length?Math.max(0,(60-Math.min(...mqs))/60):0,
  highMQ:mqs.length?Math.min(...mqs)/100:0,
  rust:(g.rung>=9&&g.S<70)?1:0,lowTeam:1-g.alloc.team/budget(),
  noRest:g.alloc.rest===0?1:0,craft:Math.min(1,g.alloc.craft/3),trigger:0};
}
function gateOK(ga){
 if(!ga)return true;
 if(ga.S&&g.S<ga.S)return false; if(ga.R&&g.R<ga.R)return false;
 if(ga.N&&g.N<ga.N)return false; if(ga.E&&g.E<ga.E)return false;
 if(ga.teamLife&&g.teamLife<ga.teamLife)return false;
 if(ga.flag&&!g.flags[ga.flag])return false;
 if(ga.far&&!g.ventures.some(v=>v.dist>=2))return false;
 if(ga.london&&!g.ventures.some(v=>Math.abs(v.dist-1.6)<.01))return false;
 return true;
}
function drawEvent(){
 if(g.setbacks>=2&&!g.seen.G2&&gateOK()){const e=EVENTS.find(e=>e.id==="G2");g.seen.G2=1;return e;}
 const t=terms(),pool=[];
 for(const e of EVENTS){
  if(e.ex.trigger)continue;
  if(g.rung<e.b[0]||g.rung>e.b[1])continue;
  if(e.once&&g.seen[e.id])continue;
  if(!gateOK(e.ga))continue;
  let s=(g.jit&&g.jit[e.id])||0;for(const k in e.ex)s+=e.ex[k]*(t[k]||0);
  if(e.once&&!g.seen[e.id])s+=1.5;
  s-=1.5*Math.log(1+(g.seen[e.id]||0));
  pool.push([e,Math.exp(s)]);
 }
 const quietW=Math.E, total=quietW+pool.reduce((a,p)=>a+p[1],0);
 let r=Math.random()*total;
 if(r<quietW)return null;
 r-=quietW;
 for(const[e,w]of pool){r-=w;if(r<=0)return e;}
 return null;
}

/* ============ EFFECTS ============ */
function targetVenture(e){
 if(!g.ventures.length)return null;
 if(e&&e.ga&&e.ga.london)return g.ventures.find(v=>Math.abs(v.dist-1.6)<.01)||g.ventures[0];
 if(e&&e.ga&&e.ga.far)return[...g.ventures].sort((a,b)=>b.dist-a.dist)[0];
 if(e&&e.ex.highMQ)return[...g.ventures].sort((a,b)=>b.mq-a.mq)[0];
 return[...g.ventures].sort((a,b)=>a.mq-b.mq)[0];
}
function applyFx(fx,e){
 if(!fx)return;
 if(fx.S)g.S=Math.max(0,Math.min(100,g.S+fx.S));
 if(fx.R)g.R=Math.max(0,Math.min(100,g.R+fx.R));
 if(fx.N)g.N=Math.max(0,Math.min(100,g.N+fx.N));
 if(fx.E)g.E=Math.max(1,Math.min(100,g.E+fx.E));
 if(fx.Ci)g.C+=fx.Ci*Math.max(3,income());
 if(fx.prot)g.prot+=fx.prot;
 if(fx.MQ){const v=targetVenture(e);if(v)v.mq=Math.max(0,Math.min(100,v.mq+fx.MQ));}
 if(fx.sell){const v=targetVenture(e);if(v){g.ventures.splice(g.ventures.indexOf(v),1);g.C+=55*v.market;}}
 if(fx.flag)g.flags[fx.flag]=1;
 if(fx.mod)g.mods[fx.mod]=fx.mod==="slowCraft"?g.turn+8:1;
 if(fx.skipTurn)g.skipNext=true;
 if(fx.ending==="EXIT")endGame("EXIT");
}
function rollP(roll,e){
 switch(roll.stat){
  case"half":return .5;
  case"hidden":return .7;
  case"S":return sig((g.S-(roll.pivot||55))/14);
  case"N":return sig((g.N-(roll.pivot||55))/14);
  case"team":return sig((g.teamLife-40)/15);
  case"MQ":{const v=targetVenture(e);return v?sig((v.mq-55)/14):.5;}
 }return .5;
}

/* ============ EXPANSIONS ============ */
function oppoAvailable(){
 if(g.rung<8||g.betWait>0||g.nextExp>=CFG.exps.length||g.ended)return false;
 if(g.dismissedOppo===g.turn)return false;
 if(g.pendingBet&&g.pendingBet.readyTurn>g.turn)return false;
 const ex=CFG.exps[g.nextExp];
 const reb=g.nextExp<(g.maxExp||0)?.6:1;
 return g.C+CFG.borrow>=ex.cost*reb*((g.pendingBet&&g.pendingBet.mods.costMult)||1);
}
function attemptBet(mods,name){
 const i=g.nextExp,ex=CFG.exps[i],xp=XP[i];
 const rebuild=g.nextExp<(g.maxExp||0);
 const cost=ex.cost*(mods.costMult||1)*(rebuild?.6:1);
 const[b0,bS,bR,bN]=ex.bet;
 const p=sig(b0+(mods.odds||0)+(rebuild?.25:0)+(g.flags.OPERATOR?.15:0)+bS*g.S/100+bR*g.R/100+bN*g.N/100);
 g.C-=cost;g.betWait=CFG.betCool;g.pendingBet=null;
 if(Math.random()<p){
  let mq=CFG.mqHireBase+CFG.mqHireNet*g.N+(mods.mq0||0)-(mods.hireMinus||0)-(g.mods.hireMinus?8:0);
  g.maxExp=Math.max(g.maxExp||0,g.nextExp+1);
  g.ventures.push({name:name||(rebuild?"The Return":ex.name),mq:Math.max(15,Math.min(95,mq)),dist:ex.dist,market:ex.market,stars:0,hit:false,starMod:mods.starMod||0,license:!!mods.license,staffed:false});
  g.nextExp++;g.rung=Math.min(13,8+g.nextExp);
  printTicket({kind:"OPENING",ti:ex.name.toUpperCase(),sc:xp.win,cls:"special"},[{t:"Service!",say:""}]);
  logline("gold",`🏆 ${p<.45?"Against the odds — ":""}${ex.name} is yours. (The bet: ${(100*p).toFixed(0)}% and it landed.)`);
 }else{
  g.C+=cost*(1-CFG.failFrac);g.R=Math.max(0,g.R-CFG.failRep);
  printTicket({kind:"THE FALL",ti:ex.name.toUpperCase(),sc:xp.lose,cls:"special"},[{t:"Back to the pass.",say:""}]);
  logline("bad",`💸 The ${ex.name} bet fails. ${(100*(1-p)).toFixed(0)}% chance it would — the odds were readable, going in. −${money(cost*CFG.failFrac)} and a bruised name.`);
 }
}

function ceremonyTickets(queue){
 for(const o of queue){
  if(o.type==="promo"){const p=PROMOS[o.r];
   printTicket({kind:"PROMOTION",ti:"👨‍🍳 "+p.ti.toUpperCase(),sc:p.sc,scAlt:p.scAlt,cls:"star"},[{t:"To work.",say:""}]);}
  else if(o.type==="star"){
   printTicket({kind:"MICHELIN",ti:"⭐ A STAR FOR "+o.v.toUpperCase(),sc:["","Its first star. The plaque is small. Tonight is not.","A second star. Different mountain, same rope.","THREE STARS. There is no fourth. There is only keeping them."][o.n],cls:"star"},[{t:"Back to the pass.",say:""}]);}
 }
}

/* ---- endings ---- */
function legacyScore(){return 10*g.rung+12*stars(g)+Math.max(0,g.C)/40+5*Math.sqrt(g.prot)+g.R/10;}
function endGame(kind){
 if(g.ended)return;g.ended=kind;
 let ep;
 if(kind==="EXIT")ep=ENDINGS.EXIT;
 else if(kind==="RUIN")ep=g.scandals>=3?ENDINGS.RUIN_SCANDAL:g.setbacks>=5?ENDINGS.RUIN_BODY:ENDINGS.RUIN_DEBT;
 else ep=ENDINGS.legacy(g);
 const st=stars(g);
 const EPITHETS={SPINE:"a spine, on record",BRASSE_DEBT:"gave the Old Man a Sunday",TOMAS:"trained the successor",V_KNOWS:"kept a line of V.'s for thirty years",OPERATOR:"read the books when nobody asked",DANE:"took the Dane's napkin",INDEPENDENT:"refused the napkin",ALL_IN:"never sold",NOTICED:"noticed early, at the staff meal",SHORTCUT:"and one stock cube, never quite forgotten",HOME:"made it home, in the end"};
 const traits=Object.keys(EPITHETS).filter(f=>g.flags[f]).map(f=>EPITHETS[f]);
 const remembers=traits.length?`<br><br><i>The trade remembers: ${traits.join(" · ")}.</i>`:"";
 const recap=remembers+`<br><br><span class="mono" style="font-size:12px;display:block;background:#f5efdd;padding:10px;border-radius:10px">${RUNGS[g.rung]} · ${st} star${st===1?"":"s"} · ${money(g.C)} · ${g.ventures.length} kitchen${g.ventures.length===1?"":"s"}<br>${Math.floor(g.turn/2)} years on the line · ${g.setbacks} burn${g.setbacks===1?"":"s"} · people carried forward: ${g.prot.toFixed(0)}<br><b>LEGACY ${legacyScore().toFixed(0)}</b></span>`;
 printTicket({kind:"LAST ORDERS",ti:(kind==="RUIN"?"🍂 ":st?"⭐ ":"🍽️ ")+ep[0].toUpperCase(),sc:ep[1]+recap,cls:"star"},
  [{t:"Start a new career.",say:""}],()=>{newGame();$("log").innerHTML="";$("tickets").innerHTML="";render();firstShift();});
 save();render();
}

/* ============ THE TURN ============ */
function runService(){
 if(awaitingChoice||g.ended)return;
 g.turn++;g.onRung++;if(g.betWait>0)g.betWait--;
 if(!logFresh)$("log").innerHTML="";
 logFresh=false;
 $("tickets").innerHTML="";
 const prevC=g.C,res=[];
 const lev=applyLevers();
 passive(res);
 g._growth=Math.max(0,Math.min(1,(g.C-prevC)/Math.max(6,income()*6)));
 hazards(res);
 const queue=[];michelin(queue);promotion(queue);
 for(const l of lev)logline(...l);
 for(const r of res)logline(...r);
 for(const q of queue){
  if(q.type==="promo")logline("gold",`👨‍🍳 PROMOTED — you are now ${RUNGS[q.r].toUpperCase()}. (${["","Someone quit; you carry things now.","Ilya's knife is yours.","A station of your own.","The schedule has your name where his was.","The fish is yours — a knighthood.","Tuesdays, you run the pass.","The gamble of an owner's life, on you.","Your name, embroidered."][q.r]||""})`);
  if(q.type==="star")logline("gold",`⭐ MICHELIN — ${q.v} holds ${q.n} star${q.n>1?"s":""}. The plaque is small. Tonight is not.`);
 }
 if(g.C<CFG.debtLimit){render();endGame("RUIN");return;}
 if(g.turn>CFG.maxTurns){render();endGame("LEGACY");return;}
 ceremonyTickets(queue);
 /* pending staged bet ready? */
 if(g.pendingBet&&g.pendingBet.readyTurn<=g.turn){
  attemptBet(g.pendingBet.mods,g.pendingBet.name);}
 else{
  const e=drawEvent();
  if(e){g.seen[e.id]=(g.seen[e.id]||0)+1;if(e.setFlag)g.flags[e.setFlag]=1;printTicket(e,e.ch,()=>{});}
  else{$("tickets").innerHTML="";logline("info","· "+QUIET[Math.floor(Math.random()*QUIET.length)]);}
 }
 g.alloc={craft:0,rep:0,cap:0,team:0,rest:0};
 save();render();
}

/* ============ WIRING ============ */
$("levers").addEventListener("click",ev=>{
 const b=ev.target.closest("button");if(!b)return;
 const k=b.dataset.l,d=+b.dataset.d;
 const spent=Object.values(g.alloc).reduce((a,x)=>a+x,0);
 if(d>0&&spent>=budget())return;
 g.alloc[k]=Math.max(0,g.alloc[k]+d);renderLevers();
});
$("oppobox").addEventListener("click",ev=>{
 const b=ev.target.closest("button");if(!b)return;
 const x=b.dataset.x;
 if(x==="skip"){g.dismissedOppo=g.turn;renderOppo();return;}
 const i=g.nextExp,xp=XP[i],o=xp.stage1.opts[+x];
 const nameEl=$("vname"),name=nameEl?(nameEl.value.trim()||null):null;
 const go=(mods)=>{
  if(mods.wait){g.pendingBet={mods,name,readyTurn:g.turn+mods.wait};
   logline("info","🧭 You wait, and scout. The bet ripens.");renderOppo();$("oppobox").innerHTML="";}
  else if(xp.stage2){
   printTicket({kind:"THE YEAR OF THREE OPENINGS",ti:xp.stage2.ti,sc:xp.stage2.sc,cls:"special"},
    xp.stage2.opts.map(o2=>({t:o2.t,say:"The other two openings begin without you — in every sense.",fx:{}})),
    (c)=>{const j=xp.stage2.opts.findIndex(o2=>o2.t===c.t);
     attemptBet({...mods,...xp.stage2.opts[j].mods},name);render();});
  }
  else attemptBet(mods,name);
  render();
 };
 go({...o.mods});
});
$("runbtn").onclick=runService;
$("b-save").onclick=()=>{save();logline("info","💾 Saved. Close the tab; the kitchen keeps.");};
$("b-export").onclick=()=>{
 const a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([JSON.stringify(g)],{type:"application/json"}));
 a.download="service-save.json";a.click();};
$("b-import").onclick=()=>$("filein").click();
$("filein").onchange=ev=>{
 const f=ev.target.files[0];if(!f)return;
 f.text().then(t=>{try{g=JSON.parse(t);save();$("log").innerHTML="";$("tickets").innerHTML="";render();logline("info","⤒ Save loaded. Back to the pass.");}catch(e){logline("bad","That file isn't a save.");}});};
$("b-new").onclick=()=>{if(confirm("Start a new career? The current one is lost to history."))
 {newGame();$("log").innerHTML="";$("tickets").innerHTML="";render();firstShift();}};

/* ============ BOOT ============ */
function firstShift(){printTicket({kind:"FIRST SHIFT",ti:"THE PLONGE",sc:"You are eighteen or thereabouts, and the sink is the size of a bathtub. Somewhere above the steam, a kitchen is happening. Spend your points at THE PASS below, then run your first service. (Craft makes you better; Buzz makes you known; Money keeps the lights on; People remember; Rest — take it before it takes you.)"},[{t:"Roll up your sleeves.",say:"The water is exactly too hot. Good. Everything starts here."}]);}
if(!load())newGame();
if(g.ended){newGame();}
render();
if(g.turn===0)firstShift();
</script>
