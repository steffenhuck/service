<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SERVICE! — from the plonge to the world</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script data-goatcounter="https://steffenhuck.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
<style>
:root{
  --tile:#f4f1e8; --grout:#ded7c6; --ink:#28313c; --ink2:#5b6672;
  --gas:#3a7bd5; --gasdeep:#2b5fa8; --copper:#c2691e; --tomato:#d94f3d;
  --butter:#f2c14e; --parsley:#4a8c5c; --paper:#fdfaf2; --paperedge:#e9dfc8;
  --shadow:0 3px 0 rgba(40,49,60,.14);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--ink); background:var(--tile);
  /* subway tile */
  background-image:
    linear-gradient(var(--grout) 1.5px, transparent 1.5px),
    linear-gradient(90deg, var(--grout) 1.5px, transparent 1.5px);
  background-size:100% 56px, 112px 56px;
  min-height:100vh;
}
#app{max-width:520px;margin:0 auto;padding:10px 12px 140px}
h1,h2,h3,.disp{font-family:"Bricolage Grotesque",system-ui,sans-serif}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace}

/* ---------- header ---------- */
header{display:flex;align-items:center;gap:10px;padding:8px 2px 4px}
.burner{width:54px;height:54px;flex:0 0 54px}
h1{font-size:30px;line-height:1;margin:0;font-weight:800;letter-spacing:-.5px}
h1 small{display:block;font-size:11px;font-weight:600;color:var(--ink2);letter-spacing:.4px;margin-top:3px}
.whenwhere{margin-left:auto;text-align:right}
.season{font-weight:700;font-size:14px}
.rungname{font-size:11px;color:var(--gasdeep);font-weight:700;text-transform:uppercase;letter-spacing:.5px}

/* ---------- ladder ---------- */
.ladder{display:flex;gap:3px;margin:6px 0 10px;align-items:flex-end}
.ladder i{flex:1;height:7px;border-radius:3px;background:#e4ddcd;border:1px solid #d7cfba;transition:background .4s}
.ladder i.done{background:var(--copper);border-color:var(--copper)}
.ladder i.now{background:var(--gas);border-color:var(--gasdeep);height:12px;animation:pulse 1.6s infinite}
#nextinfo{font-size:10.5px;color:var(--ink2);margin:-4px 0 8px;font-weight:600}
#nextinfo b{color:var(--gasdeep)}
#nextinfo .met{color:var(--parsley)}
@keyframes pulse{50%{opacity:.55}}

/* ---------- stats ---------- */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px}
.stat{background:var(--paper);border:1.5px solid var(--paperedge);border-radius:12px;padding:6px 4px 5px;text-align:center;box-shadow:var(--shadow)}
.stat svg{width:22px;height:22px;display:block;margin:0 auto 2px}
.stat .val{font-weight:600;font-size:13px}
.stat .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink2)}
.bar{height:5px;border-radius:3px;background:#eee6d4;margin-top:4px;overflow:hidden}
.bar b{display:block;height:100%;border-radius:3px;transition:width .5s}
.stat.warn{border-color:var(--tomato);animation:pulse 1.2s infinite}
.money .val{color:var(--copper)} .money .val.debt{color:var(--tomato)}

/* ---------- ventures ---------- */
#ventures{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}
#ventures:empty{display:none}
.vcard{flex:0 0 138px;background:var(--paper);border:1.5px solid var(--paperedge);border-radius:12px;padding:0 0 7px;box-shadow:var(--shadow);position:relative}
.vcard .awning{height:16px;border-radius:10px 10px 0 0;background:repeating-linear-gradient(90deg,var(--tomato) 0 12px,#fff 12px 24px)}
.vcard.far .awning{background:repeating-linear-gradient(90deg,var(--gas) 0 12px,#fff 12px 24px)}
.vcard .vname{font-weight:700;font-size:12px;padding:5px 8px 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard .vmeta{font-size:10px;color:var(--ink2);padding:0 8px}
.vcard .vstars{position:absolute;top:20px;right:6px;font-size:11px;letter-spacing:1px;color:var(--butter);text-shadow:0 1px 0 rgba(0,0,0,.25)}
.mq{margin:5px 8px 0}
.mq .bar b{background:var(--parsley)}
.vcard.rot .mq .bar b{background:var(--tomato)}
.vcard .staffed{position:absolute;top:-7px;left:8px;background:var(--parsley);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;display:none}
.vcard.staffed .staffed{display:block}

/* ---------- ticket rail ---------- */
#rail{position:relative;margin:4px 0 10px;min-height:8px}
.railbar{height:10px;background:linear-gradient(#39424e,#28313c);border-radius:5px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.3)}
.ticket{
  background:var(--paper);border:1.5px solid var(--paperedge);border-top:none;
  border-radius:0 0 12px 12px;margin:0 10px;padding:12px 14px 13px;
  box-shadow:0 6px 14px rgba(40,49,60,.15);
  font-family:"IBM Plex Mono",monospace;position:relative;
  transform-origin:top center;
}
.ticket::before{ /* perforation */
  content:"";position:absolute;top:0;left:0;right:0;height:0;
  border-top:2px dashed #cfc6ae;
}
.ticket.printing{animation:printout .55s steps(6) both}
@keyframes printout{from{clip-path:inset(0 0 100% 0)}to{clip-path:inset(0 0 0% 0)}}
.tkind{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink2);display:flex;justify-content:space-between}
.ttitle{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:19px;margin:4px 0 6px;letter-spacing:-.3px}
.tscene{font-family:system-ui,sans-serif;font-size:14px;line-height:1.45;color:#37404b}
.tchoices{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.tchoices button{
  font-family:system-ui,sans-serif;text-align:left;font-size:14px;font-weight:600;
  background:#fff;border:2px solid var(--gas);color:var(--gasdeep);
  border-radius:11px;padding:10px 12px;cursor:pointer;transition:transform .06s;
}
.tchoices button:active{transform:scale(.98)}
.tchoices button:disabled{border-color:#d8d2c2;color:#a9a394;background:#faf7ef}
.tchoices button .why{display:block;font-size:11px;font-weight:500;color:var(--ink2)}
.tchoices button.hot{border-color:var(--tomato);color:var(--tomato)}
.tresult{margin-top:9px;font-size:13px;font-weight:600;color:var(--parsley)}
.tresult.bad{color:var(--tomato)}
.ticket.special{background:#fff8e6;border-color:#ecd9a0}
.ticket.star{background:#fffdf4;border-color:var(--butter)}

/* ---------- the pass (allocation) ---------- */
#pass{background:var(--paper);border:1.5px solid var(--paperedge);border-radius:14px;padding:11px 12px;box-shadow:var(--shadow)}
#pass h2{margin:0 0 2px;font-size:15px;display:flex;justify-content:space-between;align-items:center}
.budget{font-size:12px;color:var(--ink2);font-weight:600}
.flames{letter-spacing:2px}
.levers{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.lever{background:#fff;border:1.5px solid var(--paperedge);border-radius:12px;padding:6px 2px 6px;text-align:center;user-select:none}
.lever svg{width:24px;height:24px;display:block;margin:0 auto}
.lever .lname{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin:2px 0 4px}
.lever .pts{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:15px;min-height:20px}
.lever .pm{display:flex;gap:4px;justify-content:center;margin-top:3px}
.lever .pm button{width:30px;height:28px;border-radius:8px;border:2px solid var(--gas);
  background:#fff;color:var(--gasdeep);font-size:16px;font-weight:800;cursor:pointer;line-height:1}
.lever .pm button:active{transform:scale(.94)}
.lever .pm button:disabled{border-color:#ddd6c4;color:#c8c1ae}
.lever.lit{border-color:var(--gas);background:#f2f7ff}
#runbtn{
  display:block;width:100%;margin-top:11px;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(180deg,var(--tomato),#c23f2f);color:#fff;
  font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:19px;letter-spacing:.5px;
  cursor:pointer;box-shadow:0 4px 0 #8f2c20;
}
#runbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #8f2c20}
#runbtn:disabled{background:#b8b2a2;box-shadow:0 4px 0 #918c7e;cursor:default}

/* ---------- expansion card ---------- */
.oppo{background:#eef5ff;border:2px dashed var(--gas);border-radius:14px;padding:11px 13px;margin:10px 0;box-shadow:var(--shadow)}
.oppo h3{margin:0 0 3px;font-size:16px;color:var(--gasdeep)}
.oppo p{margin:0 0 8px;font-size:13px;line-height:1.4}
.oppo .odds{font-family:"IBM Plex Mono",monospace;font-size:12px;margin-bottom:8px}
.oppo button{border:2px solid var(--gas);background:#fff;color:var(--gasdeep);border-radius:11px;
  padding:9px 13px;font-weight:700;font-size:14px;cursor:pointer;margin-right:6px}

/* ---------- log ---------- */
#log{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.logline{font-size:12.5px;background:rgba(253,250,242,.9);border-radius:9px;padding:5px 10px;border:1px solid var(--paperedge)}
.logline.good{border-left:4px solid var(--parsley)}
.logline.bad{border-left:4px solid var(--tomato)}
.logline.info{border-left:4px solid var(--gas)}
.logline.gold{border-left:4px solid var(--butter);background:#fffbe9}

/* ---------- overlays ---------- */
#overlay{position:fixed;inset:0;background:rgba(40,49,60,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
#overlay.show{display:flex}
.ocard{background:var(--paper);border-radius:18px;max-width:440px;width:100%;padding:22px 20px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.35);max-height:86vh;overflow:auto}
.ocard h2{font-size:24px;margin:6px 0 8px}
.ocard p{font-size:14.5px;line-height:1.5;text-align:left}
.ocard .big{font-size:52px;line-height:1;margin:4px 0}
.ocard button{margin-top:12px;padding:12px 22px;border:none;border-radius:12px;background:var(--gas);
  color:#fff;font-weight:800;font-size:16px;cursor:pointer;font-family:"Bricolage Grotesque",sans-serif}
.starpop{display:inline-block;animation:starpop .7s cubic-bezier(.2,1.6,.4,1) both}
@keyframes starpop{from{transform:scale(0) rotate(-90deg)}to{transform:scale(1) rotate(0)}}

/* ---------- footer ---------- */
footer{position:fixed;bottom:0;left:0;right:0;background:rgba(244,241,232,.95);border-top:1.5px solid var(--grout);backdrop-filter:blur(4px)}
.fin{max-width:520px;margin:0 auto;display:flex;flex-direction:column;gap:6px;padding:8px 12px}
.finrow{display:flex;gap:6px}
.finrow button{flex:1;font-size:11.5px;font-weight:700;padding:8px 4px;border-radius:9px;border:1.5px solid var(--paperedge);background:var(--paper);color:var(--ink2);cursor:pointer}
#b-new{width:100%;padding:13px;border:none;border-radius:12px;background:var(--gas);color:#fff;
 font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:17px;letter-spacing:.5px;
 cursor:pointer;box-shadow:0 3px 0 var(--gasdeep)}
#b-new:active{transform:translateY(2px);box-shadow:0 1px 0 var(--gasdeep)}
.fin button:active{transform:scale(.97)}

.steam{opacity:.7}
.steam path{stroke:var(--ink2);stroke-width:1.6;fill:none;stroke-linecap:round;
  stroke-dasharray:20;animation:steam 2.4s linear infinite}
.steam path:nth-child(2){animation-delay:.8s}
@keyframes steam{from{stroke-dashoffset:40;opacity:0}30%{opacity:.8}to{stroke-dashoffset:0;opacity:0}}
.flick{animation:flick .55s infinite alternate ease-in-out;transform-origin:center 80%}
@keyframes flick{from{transform:scaleY(1) skewX(0)}to{transform:scaleY(1.14) skewX(-3deg)}}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
button:focus-visible{outline:3px solid var(--butter);outline-offset:2px}
.sig{display:block;text-align:center;margin:30px 0 4px;font-family:"IBM Plex Mono",monospace;
 font-size:11px;letter-spacing:5px;color:var(--ink2);text-decoration:none;opacity:.75}
.sig:hover{color:var(--gasdeep);opacity:1}
</style>
</head>

<script>
'use strict';
/* ============ CONFIG (ported from harness v0.9) ============ */
const RUNGS=["Dishwasher","Kitchen porter","Apprentice","Commis","Demi chef de partie","Chef de partie","Sous chef","Head chef","Executive chef","Chef-patron","Two kitchens","London","New York","The World"];
const CFG={maxTurns:80,budget:5,execBonus:1,londonBonus:1,
 craftGain:4,craftCap:120,repGain:3,repFloor:.5,teamGain:3,restGain:12,
 promoSkill:[10,18,26,34,44,54,64,74],promoMin:3,promoInt:-2,promoWS:3,promoWR:1,promoWN:.5,
 wages:[1,1.2,1.5,2,2.5,3,4,6,9],
 exps:[
  {name:"Your own place",cost:150,dist:1,market:1,bet:[-1.5,2,2,1]},
  {name:"The Second",cost:300,dist:1.2,market:1.2,bet:[-1.8,1.5,2,1.5]},
  {name:"London",cost:550,dist:1.6,market:2.2,bet:[-2,1,2,2]},
  {name:"New York",cost:1050,dist:2.2,market:3.5,bet:[-2.2,.8,2,2.5]},
  {name:"The World",cost:1850,dist:3,market:6,bet:[-2.5,.5,2,3]}],
 betCool:3,failFrac:.7,failRep:15,borrow:200,debtLimit:-300,debtInt:.05,
 ventureInc:13,mqDecay:3,mqMaint:6,mqHireBase:40,mqHireNet:.4,mqScandal:25,
 drainBase:6,drainRung:.5,drainVent:1.2,eReset:40,setbackRep:15,setbackCap:2,
 repDecay:.03,repDecayRung:.004,rust:.992,
 starInt:-5.5,starEsc:1.2,starWS:3,starWMQ:2,starWR:1,starIncMult:1.4,starRep:12};
const sig=x=>1/(1+Math.exp(-x));

/* ============ EFFECT UNITS ============ */
/* fx: S R N E prot flat units; Ci = multiples of current income; MQ on venture in play; flag; mod */
const U={r1:4,r2:8,r3:14,s1:3,s2:6,e1:8,e2:16,e3:24,n1:4,n2:8,ci1:.8,ci2:1.6,ci3:3};

/* ============ EVENTS ============ */
/* b: rung band [lo,hi]; ex: exposure weights; ga: gates; once; sc: scene; ch: choices */
const EVENTS=[
/* ---- BAND A : the plonge ---- */
{id:"A1",ti:"The Pan",b:[0,1],ex:{base:1},alt:["Another saucepan, another wall. You have started grading the throws: this one had good rotation but the sauce survived, which costs style points.","A pan flies. You do not flinch anymore, which worries you more than the pan does."],sc:"A saucepan hits the wall half a meter from your head. Nobody looks up. The sauce it held is already being remade, by a man who is crying slightly.",ch:[
 {t:"Keep your head down. Watch how the remake is done.",fx:{S:U.s1,E:-U.e1},say:"You learn something about butter, and about walls."},
 {t:"Catch the chef's eye and hold it.",roll:{stat:"half",win:{fx:{R:U.r1},say:"A pause. A nod. The kitchen files it away."},lose:{fx:{E:-U.e2},say:"You carry the flour sacks for a month."}}}]},
{id:"A2",ti:"Staff Meal",b:[0,1],ex:{base:1},ga:{S:15},sc:"The commis who cooks staff meal is off sick. The sous points a ladle at you: “Feed sixteen people. Don't be interesting.”",ch:[
 {t:"Don't be interesting.",fx:{R:U.r1,flag:"NOTICED"},say:"Sixteen clean plates. The sous grunts, which is a medal."},
 {t:"Be interesting.",roll:{stat:"S",pivot:30,win:{fx:{R:U.r2,flag:"NOTICED"},say:"Silence, then seconds. The good silence."},lose:{fx:{R:-U.r1},say:"“The dishwasher made foam,” someone says, forever."}}}]},
{id:"A3",ti:"The Walk-In at 2 a.m.",b:[0,1],ex:{base:1},alt:["The fish van is early again. The driver has learned your name; you have learned that turbot waits for no one.","Forty kilos of ice at 2 a.m., third time this year. You and the turbot are practically colleagues now."],sc:"The fish delivery arrives four hours early. You are the only one here. Forty kilos of ice and turbot and nobody to tell you where anything goes.",ch:[
 {t:"Work it out. Put everything away right.",fx:{E:-U.e1,N:U.n1},say:"In the morning the sous checks the walk-in twice, then looks at you differently."},
 {t:"Leave a note.",fx:{R:-U.r1},say:"Notes are for front of house."}]},
{id:"A4",ti:"Ilya",b:[0,1],ex:{base:1},once:1,sc:"The other dishwasher never hurries and is always finished first. Tonight he says, unasked: “You wash in the wrong order. Come, I show you.”",ch:[
 {t:"Let him show you.",fx:{N:U.n1,mod:"plonge"},say:"There is an order to everything. You will use this forever."},
 {t:"You know how to wash dishes.",say:"Ilya shrugs. Ilya-shaped doors close."}]},
{id:"A5",ti:"Payday, Short",b:[0,1],ex:{lowC:2,base:.3},sc:"The envelope is light. The owner's arithmetic is famous for favoring the owner.",ch:[
 {t:"Say it to his face.",roll:{stat:"half",win:{fx:{Ci:U.ci1,R:U.r1},say:"He pays, annoyed. The kitchen notices the spine."},lose:{fx:{R:-U.r1},say:"The office has a memory too."}}},
 {t:"Let it go.",fx:{Ci:-.4},say:"Cheaper than a fight. Probably."},
 {t:"Mention it to the sous, quietly.",gate:{N:15},fx:{Ci:U.ci1,N:U.n1},say:"It gets fixed without weather. That's what networks are."}]},
{id:"A6",ti:"The Flare",b:[0,1],ex:{lowE:2,base:.3},sc:"Fryer flare — sudden, wrong. The commis nearest it freezes.",ch:[
 {t:"Move. Cloth, lid, done.",fx:{R:U.r2,E:-U.e2},say:"Fast hands get remembered."},
 {t:"Shout and step back.",say:"Safe. Someone else is the story tonight."}]},
{id:"A7",ti:"Sunday Double",b:[0,1],ex:{base:1},alt:["Another no-show, another double. Your Sundays are becoming a rumor.","The double again. The sous doesn't even phrase it as a question now — just points at the apron."],sc:"The other porter simply doesn't appear. The double is yours if you want it, says the sous, in a tone suggesting the question is decorative.",ch:[
 {t:"Take the double.",fx:{Ci:U.ci2,E:-U.e2},say:"Your feet file a complaint. Your pocket overrules it."},
 {t:"Keep your Sunday.",fx:{E:U.e1},say:"The sous's tone files this away."}]},
{id:"A8",ti:"The Menu French",b:[0,1],ex:{base:1},alt:["The 1 a.m. French continues. You now know that everything sounds more expensive in French, including your own tiredness — la fatigue.","You catch yourself correcting a waiter's pronunciation of ballotine. The apprentice beams like a proud parent."],sc:"You can't read the menu you wash the evidence of. Neither, it turns out, can Ilya. The apprentice — seventeen, merciless — holds classes at 1 a.m.: nage, brunoise, à la minute.",ch:[
 {t:"The 1 a.m. lessons.",fx:{S:U.s1,N:U.n1,E:-U.e1},say:"You repeat the words over the sinks like prayers."},
 {t:"Point at the plates like everyone else.",say:"The words stay foreign a while longer."}]},
{id:"A9",ti:"The Critic's Coat",b:[0,1],ex:{base:.8},sc:"You are sent front-of-house — a first — to fetch the coat of a woman the whole kitchen fears. She tips you and says: “The kitchen is loud tonight. The food isn't. Interesting.” You will think about this sentence for years.",ch:[
 {t:"“Thank you, madame.”",fx:{N:U.n1},say:"She looks at you one second longer than necessary. Filed."},
 {t:"Say nothing, remember everything.",fx:{S:U.s1},say:"Loud kitchen, quiet food. There's a whole education in it."}]},
{id:"A10",ti:"The Locked Ice Machine",b:[0,1],ex:{base:.8},sc:"The owner, convinced of theft, padlocks the ice machine. It is August. The brigade's response is operatic.",ch:[
 {t:"Learn where the sous hides the bolt cutters.",fx:{N:U.n1},say:"There are two kinds of knowledge in a kitchen. This is the second kind."},
 {t:"Stay out of the ice war.",fx:{E:U.e1},say:"The padlock lasts nine days. The story lasts forever."}]},
{id:"A11",ti:"The Staff Party",b:[0,1],ex:{base:.9},sc:"Once a year the owner closes the restaurant and the brigade cooks for the brigade. Tonight the chef makes YOU sit while he — himself, with his hands — brings you a plate. It is the strangest sensation of your life so far.",ch:[
 {t:"Eat. Say nothing. Remember it.",fx:{E:U.e1,N:U.n1},say:"For one night a year, the machine feeds its parts."},
 {t:"Sneak into the kitchen to help anyway.",fx:{N:U.n2,E:-U.e1},say:"The chef pretends not to see you at the sink. Everyone pretends not to see him smile."}]},
{id:"A12",ti:"The Bus",b:[0,1],ex:{base:.9},alt:["The bus again. You now know its driver, its moods, its lies. You budget for all three.","The bus, late, forever. You have started walking on principle. The principle is also late."],sc:"The bus ran late. You ran late. In this kitchen the two facts will not be considered related.",ch:[
 {t:"Run the last kilometer.",fx:{E:-U.e1},say:"You arrive sweating but on the right side of the sous's watch. Nobody knows what it cost. That's the job description."},
 {t:"Walk in late and take it.",fx:{R:-U.r1},say:"The silence lasts one ladle's length. The lesson lasts longer."}]},
{id:"A13",ti:"The Backroom",b:[0,1],ex:{lowC:2,base:.3},once:1,sc:"You have been kicked out of your flat — the landlord used the word 'renovation' the way landlords do. There is a backroom behind the kitchen: a cot, a bare bulb, the compressor's hum. The night porter lived there once, allegedly by choice.",ch:[
 {t:"Move in.",fx:{Ci:U.ci1,N:U.n1,E:-U.e1},say:"Rent: zero. Commute: eleven meters. Boundary between you and the kitchen: also zero. The compressor sings you to sleep, in B-flat."},
 {t:"Take Ilya's couch until you find something.",fx:{N:U.n1,Ci:-.3},say:"Ilya's couch is short and his kindness is not. You find a room in three weeks, smaller than the walk-in."}]},
{id:"A14",ti:"The Chemistry Degree",b:[0,1],ex:{base:.8},once:1,sc:"Your parents call. They have found an online degree in chemistry. They will pay. Their voices have the careful tone of people describing a lifeboat to a swimmer.",ch:[
 {t:"“I already work in a lab. The results get eaten.”",fx:{R:U.r1},say:"A long pause on the line. Then your mother, quietly: “Send us a menu, then.” You will, one day, with your name on it."},
 {t:"Take the brochure seriously for a week.",fx:{E:-U.e1,S:U.s1},say:"You read one chapter on emulsification and realize you knew it already — your hands knew it. You mail the brochure back."}]},
{id:"A15",ti:"The Carafe",b:[0,4],ex:{base:.8},once:1,sc:"A carafe — the carafe, hand-blown, older than you, priced like a small car — meets the floor. The sound is enormous. The kitchen, miraculously, hears nothing. Nobody saw. The shards and you hold a brief meeting.",ch:[
 {t:"Confess before you're asked.",fx:{Ci:-.3,R:U.r1},say:"The sous looks at the shards, then at you, longer. 'It comes off your wages in pieces you won't feel.' What he actually files away is the confession — kitchens run on knowing who tells."},
 {t:"Bury the evidence.",roll:{stat:"hidden",win:{say:"The carafe joins the long secret history of restaurant glassware. You flinch, for a while, whenever anyone opens that cupboard."},lose:{fx:{R:-U.r2},say:"The maître d' counts carafes the way misers count coins. The cover-up, as always, invoices higher than the crime."}}}]},
{id:"A16",ti:"The Six O'Clock Coffee",b:[0,1],ex:{base:.9},alt:["The coffee ritual holds. The fish man now saves you the gossip and, occasionally, the good scallops.","Years of six o'clocks. The delivery men know your name in three accents. It is a small kingdom, and it is yours."],sc:"The delivery men arrive at six: fish, vegetables, bread, in that order, in that weather. One morning you make them coffee, because the machine was on and they looked like the end of a long night. They look at you as if you'd invented the practice.",ch:[
 {t:"Make it every morning. It's your ritual now.",fx:{N:U.n1},say:"Within a month you know everything: which restaurant is late paying, which chef is leaving, where the good langoustines actually go. The intelligence service of a whole city runs on coffee at six, and you are now a branch office."},
 {t:"Twenty more minutes of sleep instead.",fx:{E:U.e1},say:"Sleep is also a currency. The fish man makes his own coffee and his own friends."}]},
{id:"A17",ti:"The Four Languages",b:[0,1],ex:{base:.8},sc:"The plonge speaks four languages, none of them yours, all of them fluent in the only grammar that matters: pass, hot, behind, careful. By week three you can curse fluently in two and pray convincingly in a third.",ch:[
 {t:"Learn everything they'll teach you.",fx:{N:U.n1},say:"Vocabulary: mostly unprintable. Value: incalculable. A kitchen is a small nation with no borders and one anthem, shouted."},
 {t:"Stick to pointing.",say:"Pointing works. It just never gets invited anywhere after close."}]},
{id:"A18",ti:"The Spoon",b:[0,1],ex:{craft:1.5,base:.4},once:1,sc:"The chef passes the plonge — a route he takes twice a year — and, absently, as if feeding a parking meter, holds out a spoon of the day's sauce. “Taste.” Your opinion has not been requested. The spoon hangs in the air anyway.",ch:[
 {t:"Say what you actually taste.",roll:{stat:"S",pivot:20,win:{fx:{S:U.s1,R:U.r1},say:"'Needs acid. A little.' The chef looks at you for the first time in the technical sense of the word looking, grunts, and walks on. The next day, the sauce has a little acid."},lose:{fx:{S:U.s1},say:"'It's… good?' The spoon is withdrawn with the disappointment of a door closing. You spend the next month learning what the question actually was."}}}]},
{id:"A19",ti:"The Squirrel",b:[0,4],ex:{lowE:1.2,base:.4},once:1,sc:"You dream of a squirrel. He sits on the pass, composed, holding a tiny hazelnut like a canapé, and speaks in a voice of complete reasonableness: “Eat me. Eat me.” You wake before the ethics resolve.",ch:[
 {t:"Tell the brigade at family meal.",fx:{N:U.n1},say:"The kitchen adopts it instantly. For years — years — whenever anything looks ambitious on a plate, someone whispers 'eat me, eat me' and the line loses thirty seconds to weeping. You have accidentally donated a folklore."},
 {t:"Eat a proper breakfast and mention it to no one.",fx:{E:U.e1},say:"The interpretation, on reflection, was hunger. Most omens are. You buy eggs."}]},
/* ---- BAND B : the stations ---- */
{id:"B1",ti:"Marguerite's Shortcut",b:[2,4],ex:{lowE:2,base:.3},setFlag:"MARG",sc:"Marguerite whisks like a metronome and cuts every corner the eye can't see. “The stock cube exists,” she says. “The chef's palate is forty years of cigarettes. Choose sleep.”",ch:[
 {t:"Choose sleep.",fx:{E:U.e1,flag:"SHORTCUT"},say:"You sleep. Something unlearns itself, quietly."},
 {t:"Make the stock.",fx:{E:-U.e1,S:U.s1},say:"Four hours. Bones know things cubes don't."}]},
{id:"B2",ti:"The Tasting Spoon",b:[2,4],ex:{craft:2},once:1,sc:"The chef tastes your sauce without a word and walks away. Thursday, it's on the menu. Nobody tells you — you find out from the printed card.",ch:[
 {t:"Read the card again. Once more.",fx:{R:U.r1,S:U.s1},say:"Your sauce. His menu. The order of those words will change someday."}]},
{id:"B3",ti:"The Stage",b:[2,4],ex:{base:1},ga:{E:50},sc:"The starred place across town takes stagiaires on Mondays — your day off. Unpaid. The chef there is a lunatic in the good way.",ch:[
 {t:"Give them your Mondays.",fx:{S:U.s2,E:-U.e2,Ci:-.4},say:"You learn what a kitchen sounds like when nobody has to shout."},
 {t:"Keep your Mondays.",fx:{E:U.e1},say:"A life, briefly."}]},
{id:"B4",ti:"The Cut",b:[2,4],ex:{lowE:2,base:.2},alt:["The board is red again — other thumb this time, symmetry of a kind. The tiredness keeps a ledger.","Another cut, shallower. Your hands are learning to fail more carefully."],sc:"Deep, thumb, mid-service — your own fault, the tiredness fault. The board is red where it shouldn't be.",ch:[
 {t:"Tape it, glove it, finish service.",fx:{E:-U.e2,R:U.r1},say:"It holds. Barely. The scar will read like a diploma."},
 {t:"Step off the line.",fx:{R:-U.r1,E:U.e1},say:"The correct choice, which is why it costs."}]},
{id:"B5",ti:"The Old Man's Sunday",b:[2,4],ex:{base:.8},ga:{N:20},once:1,sc:"Chef Brasse, who has thrown cookware at you for two years, asks — asks — whether you'd help him cook his friend's funeral lunch on Sunday. Unpaid, obviously.",ch:[
 {t:"Sunday, then.",fx:{N:U.n2,flag:"BRASSE_DEBT"},say:"The Old Man remembers everything. Including this."},
 {t:"Decline politely.",say:"The pans resume Monday."}]},
{id:"B6",ti:"The Competition",b:[2,4],ex:{base:.8},ga:{S:30},setFlag:"MARG",sc:"A young chefs' prize: one plate, twenty minutes, judges with pens. Marguerite has already entered.",ch:[
 {t:"Enter.",fx:{E:-U.e1},roll:{stat:"S",pivot:45,win:{fx:{R:U.r2},say:"Second place. In this room, second place is a name."},lose:{fx:{R:-U.r1},say:"Public is public both ways."}}},
 {t:"Watch Marguerite.",fx:{N:U.n1},say:"She places third and blames the plates. You buy the beer."}]},
{id:"B7",ti:"The Fish Is Off",b:[2,4],ex:{base:1},sc:"You smell it before you see it. The chef says serve it; the margin says serve it; your nose says what it says.",ch:[
 {t:"Refuse, loudly.",fx:{R:-U.r1,flag:"SPINE"},say:"The chef stares. The brigade doesn't breathe. The fish does not go out."},
 {t:"Serve it.",roll:{stat:"hidden",win:{say:"Nothing happens. This time."},lose:{fx:{R:-U.r2},say:"A guest, a doctor, a phone call. The margin was not worth this."}}},
 {t:"Swap it with the morning van, quietly.",gate:{N:25},fx:{S:U.s1,N:U.n1},say:"Nobody ever knows. The best outcomes are invisible ones."}]},
{id:"B8",ti:"The Side Gig",b:[2,4],ex:{fastC:2,base:.3},sc:"A waiter's cousin needs a cook for cash weddings — Sundays, no questions, no names. The chef's rule about outside work is also real, the way weather is real.",ch:[
 {t:"Take the work.",fx:{Ci:U.ci2,E:-U.e1},roll:{stat:"hidden",win:{say:"The envelopes are thick and quiet."},lose:{fx:{R:-U.r1},say:"Kitchens hear everything. Chefs hear more."}}},
 {t:"Decline.",say:"Your Sundays stay poor and legal."}]},
{id:"B9",ti:"Family Meal, Your Turn",b:[2,4],ex:{base:1},sc:"The rotation lands on you, and the dish living rent-free in your head sees its chance. The brigade is the hardest room you'll ever cook for: sixteen people who know exactly how everything is done, and say so with their forks.",ch:[
 {t:"Test the dish.",roll:{stat:"S",pivot:38,win:{fx:{S:U.s1,R:U.r1},say:"The sous asks for the recipe. That's the medal."},lose:{fx:{S:U.s1},say:"The forks were eloquent. You learned anyway."}}},
 {t:"Pasta again.",fx:{E:U.e1},say:"The brigade cheers. Ambition rests."}]},
{id:"B10",ti:"The Broken Sauce",b:[2,4],ex:{base:1},sc:"Two hundred covers and the beurre blanc splits at 19:55 like a marriage. The chef is at the pass. You have the width of one ticket to decide who finds out.",ch:[
 {t:"Rebuild it in four minutes.",roll:{stat:"S",pivot:42,win:{fx:{S:U.s1,R:U.r1},say:"Nobody ever knows. That's mastery."},lose:{fx:{R:-U.r1,E:-U.e1},say:"Everybody knows."}}},
 {t:"Call the sous.",fx:{N:U.n1,R:-U.r1},say:"Help is remembered two ways."}]},
{id:"B11",ti:"The Onion Test",b:[2,4],ex:{base:.9},sc:"The new sous lines up the whole brigade and has everyone dice one onion. He inspects the boards in silence, like a customs officer.",ch:[
 {t:"Dice like your life depends on it.",roll:{stat:"S",pivot:32,win:{fx:{R:U.r1,S:U.s1},say:"He holds up YOUR board to the others. You will dine out on this for a decade."},lose:{fx:{S:U.s1},say:"“Adequate.” In sous, that's a full paragraph."}}},
 {t:"Dice like it's an onion.",say:"It is, after all, an onion. The sous disagrees with your philosophy."}]},
{id:"B12",ti:"The Wrong Table",b:[2,4],ex:{base:.9},sc:"Your plate for table twelve lands at table fourteen. Table fourteen, it emerges, contains a food writer, who is now photographing your mistake.",ch:[
 {t:"Say nothing. Let the mistake have its career.",roll:{stat:"half",win:{fx:{R:U.r2},say:"“An unlisted dish of surprising conviction.” Your error is now the most famous thing you've made."},lose:{say:"The photo is never published. Mistakes usually aren't."}}},
 {t:"Send the correction to twelve, fast.",fx:{S:U.s1},say:"Order restored. Fame postponed."}]},
{id:"B13",ti:"The Order Sheet",b:[2,4],ex:{base:.9},sc:"They give you the ordering for the first time. On Thursday a lorry delivers three hundred lemons. You ordered by the piece; the sheet reads by the crate.",ch:[
 {t:"Confess before anyone counts.",fx:{R:U.r1},roll:{stat:"half",win:{say:"The chef laughs so hard he has to sit down. Lemon week enters legend: lemon tart, lemon fish, lemon everything."},lose:{fx:{Ci:-.4},say:"The chef does not laugh. Lemon week still happens; you are its patron saint, unpaid."}}},
 {t:"Quietly sell the surplus to the bistro next door.",gate:{N:20},fx:{N:U.n1,Ci:.3},say:"Problem, meet other people's problems. The bistro owes you one."}]},
{id:"B14",ti:"The Fever",b:[2,4],ex:{lowE:1.8,base:.3},sc:"You wake with a fever and the specific dread of the kitchen calendar: it is Friday. You wonder whether it's something contagious, which is another way of wondering whether you can pretend it isn't.",ch:[
 {t:"Work through it.",roll:{stat:"hidden",win:{fx:{E:-U.e2,R:U.r1},say:"You sweat it out over the stove. The brigade notices and says nothing, which is the brigade's word for respect."},lose:{fx:{E:-U.e2,N:-U.n1,R:-U.r1},say:"By Tuesday, half the line has it. Arithmetic is done aloud, tracing it back to your Friday."}}},
 {t:"Call in sick.",fx:{R:-U.r1,E:U.e1},say:"The correct choice. The kitchen's opinion of correct choices is on file."},
 {t:"Come in, confess to the sous, let him decide.",fx:{N:U.n1,E:U.e1},say:"He sends you home with soup — actual soup, from the pot. You learn something about how authority is supposed to work."}]},
{id:"B15",ti:"Something Bitter",b:[2,4],ex:{base:.9},once:1,sc:"A guest has found something bitter in the oyster dish — your dish. The service team stands in the kitchen doorway with the plate, awaiting an explanation the way courts await verdicts. His champagne, you happen to know, has been open since Tuesday.",ch:[
 {t:"Blame the oxidized champagne.",roll:{stat:"half",win:{say:"The sommelier — who opened that bottle — corroborates with remarkable speed. You owe each other one now, which is how kitchens are actually held together."},lose:{fx:{R:-U.r2,N:-U.n1},say:"The sommelier declines to fall on your sword. Front of house remembers who tried to hand it to him."}}},
 {t:"Taste it, own it.",fx:{R:-U.r1,S:U.s1},say:"A bad diverticule, one oyster in ten thousand. You take the hit and learn the smell of it forever — which is the tuition."},
 {t:"Comp the table, investigate the batch.",gate:{N:20},fx:{N:U.n1,S:U.s1},say:"You trace it to Tuesday's delivery and quietly bin the rest. The guest leaves happy. The supplier gets a phone call he remembers."}]},
{id:"B16",ti:"The Bender",b:[2,6],ex:{lowE:1.5,base:.4},sc:"On your way home you stumble into an old colleague from your first kitchen. He is three bars into a bender and delighted to see you, in the way of men who need a witness.",ch:[
 {t:"Join him.",fx:{N:U.n2,E:-U.e2,mod:"fluNext"},say:"The night acquires chapters. Somewhere in chapter four he tells you the truest thing anyone has said about this trade; by morning you can't remember it, only that it was true. Tomorrow will run heavy."},
 {t:"Walk him home instead.",fx:{N:U.n1,E:-U.e1},say:"Forty minutes, two confessions, one doorstep. He texts you at noon: thanks. Nothing else. Enough."},
 {t:"Keep walking.",say:"Your bed forgives you. Somewhere, chapter four happens without a witness."}]},
{id:"B17",ti:"The Journalist",b:[2,6],ex:{base:.7},once:1,sc:"A journalist buys you a drink you didn't order and slides into the next seat. He'd like gossip — who dines with whom, who drinks what, who cried at table nine. The sum he names is several months of your wages, said casually, the way rich men say small numbers.",ch:[
 {t:"Take the money.",fx:{Ci:U.ci2},roll:{stat:"hidden",win:{say:"Three items run, unattributed. The money is real and spends normally, which surprises you slightly."},lose:{fx:{R:-U.r3,N:-U.n2},say:"The third item could only have come from someone at the pass. The maître d' does the arithmetic in front of everyone. There is no wage in the trade for a cook who talks."}}},
 {t:"“The dining room is a confessional.”",fx:{R:U.r1},say:"He smiles, pays for the drink, leaves a card 'in case you change your mind.' Years later, when it matters, he prints only kind and accurate things about you. Discretion pays late, but it pays."},
 {t:"Feed him something harmless and false.",fx:{N:U.n1},say:"The item runs: a soap actress and a cabinet minister who have never met are reported 'inseparable.' Their publicists send flowers. Yours is a strange industry adjacent to several stranger ones."}]},
{id:"B18",ti:"The Notebook Recipe",b:[2,4],ex:{craft:1.5,base:.4},once:1,sc:"In your spare time — a concept the schedule permits every third Tuesday — you have been circling a recipe. Tonight, on the fourth attempt, it lands. You stand in your tiny kitchen at 1 a.m. holding a spoon and the unmistakable knowledge that this is stunning.",ch:[
 {t:"Bring it to the chef and the team.",roll:{stat:"half",win:{fx:{R:U.r2,N:U.n1},say:"The chef tastes it twice, in silence, then says your name to the whole kitchen and puts the dish on Friday's menu — with your name in the margin of his copy, which is where history is actually written."},lose:{fx:{R:U.r1,S:U.s1},say:"It appears on the menu inside a fortnight, subtly reworded, credited to the house. You've just paid the trade's oldest tuition fee. The next one stays in the notebook until the menu is yours."}}},
 {t:"Keep it for later.",fx:{S:U.s1},say:"It waits in the notebook, compounding like interest. One day there will be a menu with your name at the top and a hole exactly this shape in it."}]},
{id:"B19",ti:"The Chef's Palate",b:[2,4],ex:{craft:1.5,base:.4},once:1,sc:"The chef has a brutal head cold and a secret: he can taste nothing. Absolutely nothing. He closes the office door and says the strangest sentence of your year so far: “For three days, you are my tongue. Tell no one.”",ch:[
 {t:"Be the tongue.",roll:{stat:"S",pivot:40,win:{fx:{S:U.s2,R:U.r1},say:"Three days of seasoning by proxy, the chef watching your face like an instrument panel. Nobody notices anything — which is the highest score the exercise permits. On day four he can taste again and never mentions it. But something in the schedule shifts your way, permanently."},lose:{fx:{S:U.s1,N:U.n1},say:"Tuesday, one flat fish reaches a table. The chef takes the blame publicly, loudly, as his own — and in the walk-in afterwards says only: 'Now you know what the job weighs.' You have been taught two things at once."}}},
 {t:"“Chef, I'm not ready.”",say:"He nods once and asks the other demi. Honesty about your limits is a virtue; you spend three days watching someone else grow past theirs."}]},
{id:"B20",ti:"The Parents",b:[2,6],ex:{base:.7},once:1,sc:"A surprise: your parents, at a corner table, dressed for church, beaming at everything including the water. You had no idea. When the bill comes, they wave it away with total serenity — of course it's on the house. Their child works here.",ch:[
 {t:"“Of course it is.” Then quietly pay it yourself.",fx:{Ci:-.5},say:"A week's wages, gone, for the sight of your father telling the neighbors about the langoustines 'they insisted we try.' No upside whatsoever. You'd pay it again tomorrow."},
 {t:"“Good joke, Papa.”",say:"He pays, wounded for exactly the length of the dessert, then tips extravagantly to demonstrate wealth to no one in particular. Families are restaurants with only regulars."},
 {t:"Ask the chef.",gate:{N:25},roll:{stat:"half",win:{fx:{N:U.n1},say:"The chef walks out, shakes your father's hand, and comps the table himself. 'So THIS is where the palate comes from.' Your mother will retell this until the end of recorded time."},lose:{fx:{R:-U.r1},say:"'We are not a canteen.' Said quietly, in front of no one, which somehow makes it worse. You pay. Everyone pretends the question was never asked."}}}]},
{id:"B21",ti:"Front of House Down",b:[2,6],ex:{base:.8},once:1,sc:"Half the floor staff has the same suspicious flu. The maître d', triaging, looks through the pass at you with the expression of a general promoting a cook to cavalry: you're standing in tonight. Out there. With the guests. Wearing the good apron.",ch:[
 {t:"Serve like you cook: precise, warm, slightly too honest.",roll:{stat:"half",win:{fx:{N:U.n1,R:U.r1},say:"It turns out guests love being served by someone who can actually explain the food. Table nine asks for you specifically at dessert. The maître d' watches with the complicated face of a man discovering a rival and a resource simultaneously."},lose:{fx:{E:-U.e1},say:"You serve a woman from the wrong side, decant with the wrong hand, and refer to a guest's wife as 'chef.' The floor is a country; you are a tourist with a tray. You retreat at ten, humbled and weirdly refreshed."}}},
 {t:"“I cook.”",fx:{N:U.n1,R:-U.r1},say:"The kitchen approves of the doctrine. The office notes the inflexibility. Both are right, which is how most kitchen sentences work."}]},
/* ---- BAND C : the brigade ---- */
{id:"C1",ti:"Your First Commis",b:[5,6],ex:{base:1},sc:"There is now a person whose mistakes are your mistakes. He holds the knife like it owes him money.",ch:[
 {t:"Train him properly.",fx:{prot:1,E:-U.e1},say:"Slow now, fast later. That's the whole trade."},
 {t:"Two extra hands.",say:"Output now. Nothing later."}]},
{id:"C2",ti:"The Sous Goes Down",b:[5,6],ex:{base:.8},once:1,sc:"Scaffolding, ankle, eight weeks. The chef looks down the line, and the line looks at its shoes.",ch:[
 {t:"“I'll take his stations.”",fx:{E:-U.e2,R:U.r2,mod:"promoBonus"},say:"Eight weeks of two jobs. The schedule notices."},
 {t:"Keep your station and your health.",say:"Someone else takes the chance."}]},
{id:"C3",ti:"The Lateral Offer",b:[5,6],ex:{highR:2,base:.2},setFlag:"MARG",sc:"The bistro on the hill offers more money and a lesser kitchen. Marguerite took theirs last year and her sauces have gotten… rested.",ch:[
 {t:"Go.",fx:{Ci:U.ci2,E:U.e1,mod:"slowCraft"},say:"Comfort has a flavor. It's fine."},
 {t:"Stay.",fx:{R:U.r1},say:"Loyalty is a currency here."}]},
{id:"C4",ti:"The Notebook",b:[5,6],ex:{craft:2},once:1,sc:"Three years of stolen technique in your own hand. The chef finds it on the shelf and reads for a long time. Then: “Page forty is wrong. Show me you know why.”",ch:[
 {t:"Show him.",roll:{stat:"S",pivot:50,win:{fx:{S:U.s2,R:U.r1},say:"He corrects page forty himself. That's a gift."},lose:{fx:{S:U.s1},say:"He corrects it with less ceremony."}}}]},
{id:"C5",ti:"V., First Contact",b:[5,6],ex:{highR:2},once:1,sc:"A review of the restaurant. One line concerns you: “the fish course, at least, was cooked by someone paying attention.” You will read this line many times over the next thirty years.",ch:[
 {t:"Cut it out. Keep it.",fx:{R:U.r1,flag:"V_KNOWS"},say:"V. noticed. V. notices everything, eventually."}]},
{id:"C6",ti:"Marguerite Proposes a Trade",b:[5,6],ex:{base:.8},ga:{N:40},setFlag:"MARG",once:1,sc:"Menus travel. She'll show you theirs before it prints if you show her yours. Everyone does it, she says, which is what everyone says.",ch:[
 {t:"Trade.",fx:{N:U.n2},roll:{stat:"hidden",win:{say:"Useful. Quiet. Repeatable."},lose:{fx:{R:-U.r2},say:"It surfaces. The chef uses the word 'loyalty' once, softly."}}},
 {t:"Decline.",fx:{R:U.r1},say:"The chef learns of it eventually. Chefs learn everything eventually."}]},
{id:"C7",ti:"The Hours",b:[5,6],ex:{lowE:1.5,base:.4},sc:"The brigade counts its hours out loud one night, which is against the unwritten rules. There is talk of talking to the owner.",ch:[
 {t:"Stand with the brigade.",fx:{N:U.n2,R:-U.r1},say:"The kitchen remembers who stood where."},
 {t:"Stay out of it.",fx:{E:U.e1},say:"You sleep. The talk fails without the sous."}]},
{id:"C8",ti:"Private Dinners",b:[5,6],ex:{fastC:2,base:.3},sc:"A regular with a large apartment and larger friends offers real money for you to cook his dinner parties. “The restaurant doesn't need to know,” he says, showing exactly how much he knows about restaurants.",ch:[
 {t:"Cook them.",fx:{Ci:U.ci2,E:-U.e1},roll:{stat:"hidden",win:{say:"The apartment has better pans than the restaurant."},lose:{fx:{R:-U.r1},say:"The chef hears. The chef always hears."}}},
 {t:"Decline.",fx:{R:U.r1},say:"The chef hears about that instead."}]},
{id:"C9",ti:"The Inventory",b:[5,6],ex:{base:1},sc:"The langoustine numbers haven't added up for a month. Then one night you see how, and who. He has three children and a gambling problem, in the other order.",ch:[
 {t:"Handle it quietly.",fx:{N:U.n1},say:"It stops. The kitchen knows what you didn't do."},
 {t:"Report it.",fx:{R:U.r1,N:-U.n1},say:"Correct and expensive are often the same thing."}]},
{id:"C10",ti:"The New Chef",b:[5,6],ex:{base:.8},once:1,sc:"The Old Man retires to a village and a rumor of vegetables. His replacement is thirty-four, plates with tweezers, and says “concept” without irony. Everything you know is suddenly historical.",ch:[
 {t:"Learn the new school.",fx:{S:U.s1,E:-U.e1},say:"Tweezers, it turns out, are also a technique."},
 {t:"Cook like Brasse taught you.",fx:{R:-U.r1,flag:"SPINE"},say:"Some inheritances don't negotiate."}]},
{id:"C11",ti:"The Storm Service",b:[5,6],ex:{base:.9},sc:"The power dies at 19:20 with sixty covers booked. The gas still works. Someone finds candles. The dining room decides, collectively, that this is romantic.",ch:[
 {t:"Cook the whole night on flame and candlelight.",roll:{stat:"S",pivot:48,win:{fx:{R:U.r2,E:-U.e1},say:"The best service of the year, by acclamation. Nobody can quite say why. You can: constraints."},lose:{fx:{E:-U.e2},say:"Romance survives the soup. It does not survive the wait for mains."}}},
 {t:"Close and comp.",fx:{Ci:-U.ci1},say:"Safe. The refunds sting; the untold story stings differently."}]},
{id:"C12",ti:"The Wedding Cake",b:[5,6],ex:{base:.8},sc:"The pastry chef vanishes — a love affair, allegedly, with a sommelier from Lyon. The wedding is Saturday. Nobody in the brigade does sugar work. Everyone looks at you, because looking at you is now a thing that happens.",ch:[
 {t:"Learn cake in three days.",roll:{stat:"S",pivot:50,win:{fx:{R:U.r1,S:U.s1},say:"Three tiers, no casualties. The bride cries at the right kind of tears."},lose:{fx:{R:-U.r1,E:-U.e1},say:"The cake leans. Photographs are taken from the good side. Some are not."}}},
 {t:"Call every pastry chef you know.",gate:{N:30},fx:{N:U.n1,Ci:-.4},say:"A favor spent is a friendship audited. This one holds."}]},
{id:"C13",ti:"The Casting",b:[5,6],ex:{highR:1.5,base:.4},sc:"A television producer eats twice, then leaves a card: a cooking show, real money, faces wanted. The chef's opinion of television is printable only in part.",ch:[
 {t:"Audition, quietly.",roll:{stat:"half",win:{fx:{R:U.r2},say:"You don't get the show. You get something better: the clip. It circulates. Your name starts arriving in rooms before you do."},lose:{fx:{R:-U.r1},say:"The audition tape is found. The chef screens it at family meal, with commentary."}}},
 {t:"Toss the card.",fx:{R:U.r1},say:"The chef hears — chefs hear everything — and nods once. In this kitchen, that's a press release."}]},
{id:"C14",ti:"The Oysters",b:[5,6],ex:{base:.9},once:1,sc:"Several guests fell ill over the weekend. The common thread is the oysters. The hands that shucked them were yours. The health office uses the phrase 'no fault found' and the word 'nevertheless.'",ch:[
 {t:"Stand in front of it — full protocol review, your name on it.",fx:{R:-U.r1,S:U.s2,flag:"SPINE"},say:"You rebuild the raw bar's entire chain, tag to table. It costs you a bad month and buys you a reputation for owning things — the rarest ingredient in the building."},
 {t:"Let the investigation run its course, quietly.",roll:{stat:"hidden",win:{say:"Tuesday's batch, a warm lorry, not your hands. The file closes. Your sleep takes longer."},lose:{fx:{R:-U.r2},say:"'No fault found' travels less well than 'the oyster guy.' Kitchens abbreviate people."}}}]},
{id:"C15",ti:"The Co-Owner's Table",b:[5,6],ex:{base:.8},once:1,sc:"One of the co-owners has a table tonight, shared with surprisingly young friends. The laughter gets loud, then wrong. At some point — you see it through the pass, in the half-second the door swings — he hits one of his companions in the face.",ch:[
 {t:"Cross the room.",fx:{R:-U.r2,N:U.n2,flag:"SPINE"},say:"You are a cook interrupting an owner. Everyone present understands the arithmetic, including him. The young man leaves safely. Your name goes on a list you'll be proud of later and pay for sooner."},
 {t:"Tell the chef, now.",fx:{N:U.n1},say:"The chef walks out, folds his arms, and stands at the table saying nothing at all. It is the loudest thing you have ever seen a man not say. The table empties."},
 {t:"The pass door swings shut.",say:"You cook. The kitchen teaches many kinds of silence; this one you will taste for a while."}]},
{id:"C16",ti:"The Sauce Rouennaise",b:[5,6],ex:{lowE:1.5,base:.4},once:1,sc:"You cut yourself, and a drop of blood fell into the sauce Rouennaise — a sauce whose recipe, it must be said, already calls for blood. Traditionally not the cook's.",ch:[
 {t:"Remake it. Eleven minutes you don't have.",fx:{E:-U.e2,S:U.s1},say:"The pass waits, the chef glares, the sauce is clean. There is a line, and you know now that you don't cross it even when nobody would ever know. Especially then."},
 {t:"Whisk and serve.",roll:{stat:"hidden",win:{say:"Nobody ever knows. You know. The dish comes back polished clean, which does not help."},lose:{fx:{R:-U.r2},say:"The plongeur saw. Plongeurs see everything — you of all people should have remembered that."}}}]},
{id:"C17",ti:"The Thousand",b:[5,6],ex:{base:.8},once:1,sc:"A guest asks for you by name when she pays — for whoever cooked the fish. She presses an envelope into your hand: a thousand, cash. “That's just for you,” she says, in the tone of someone who has decided something about the world tonight.",ch:[
 {t:"Pocket it.",fx:{Ci:U.ci2},roll:{stat:"hidden",win:{say:"Just for you, she said. The envelope is quiet. So, for a while, are you."},lose:{fx:{N:-U.n2},say:"The waiter saw the envelope. The kitchen does the division you didn't, out loud, for weeks."}}},
 {t:"Split it with the brigade.",fx:{N:U.n2,Ci:.3},say:"Sixteen ways it isn't much money. It is, however, exactly one legend — the night the fish paid for everyone's taxi."},
 {t:"Give half to the plonge, quietly.",fx:{N:U.n1,Ci:U.ci1},say:"The dishwasher finds it in his coat and says nothing for three days. Then, one night: 'the fish was good.' Highest honors."}]},
{id:"C18",ti:"The Thaw",b:[5,6],ex:{base:.9},once:1,sc:"The freezer died sometime after midnight, quietly, like a conspirator. By morning, several thousand in stock is thawing on a schedule of its own. The insurance forms are in the office. The stock is in front of you, softening.",ch:[
 {t:"Cook all of it. Today. Doors open, one price, come hungry.",fx:{Ci:-U.ci1,R:U.r2,N:U.n2},say:"By noon there's a queue; by three, a street party with plates. The neighborhood eats a freezer's worth of good food at cost, and talks about it for a decade. Worst margin, best advertising, finest Tuesday of the year."},
 {t:"Triage: cook the best, staff-meal the middle, bin the rest, file the claim.",roll:{stat:"S",pivot:50,win:{fx:{Ci:.3,S:U.s1},say:"Cold arithmetic, well executed. The claim pays, the brigade eats like kings for a week, and nothing good was wasted. The adult solution — nobody writes songs about it, but the books do."},lose:{fx:{Ci:-.3,E:-U.e1},say:"The triage takes all day and the insurer's assessor disputes the middle category with theological intensity. You settle for less, exhausted, smelling faintly of defrosted everything."}}}]},
{id:"C19",ti:"Herring and Calf's Liver",b:[5,6],ex:{base:.9},once:1,sc:"The sous has been circling something on his own time, and tonight he hands you a spoon with the elaborate casualness of a man handing over his diary: herring and calf's liver. It should not work. It is extraordinary — genuinely, unignorably extraordinary. He watches your face. Your face is now a career decision.",ch:[
 {t:"Tell him the truth.",fx:{N:U.n2},say:"'It's extraordinary. Fight for it.' He does; it lands on the menu; the trade paper calls it the dish of the season. He rises — and every room he rises into hears, from him, exactly who said fight. Honesty compounds at a better rate than sabotage."},
 {t:"“Herring and liver? For hospital patients?”",roll:{stat:"hidden",win:{say:"He shelves it, deflated. Your lane stays clear. Somewhere in the notebook of the universe, an entry is made against your name in careful handwriting."},lose:{fx:{N:-U.n2,R:-U.r1},say:"He serves it anyway at a staff birthday. The room goes silent, then wild. Everyone does the arithmetic of your face that first night. Petty travels further than herring."}}},
 {t:"The truth, plus the one note it needs.",roll:{stat:"S",pivot:55,win:{fx:{S:U.s1,N:U.n2},say:"'Extraordinary. It wants acid — pickle the shallot.' He tastes, stares, and grabs your shoulder. The dish goes out with two parents. Years on, menus elsewhere credit it to 'a kitchen,' plural, which is the truth."},lose:{fx:{N:U.n1},say:"Your note doesn't survive testing, but the trying did: he trusts your palate more for the honest miss than he would for polite applause."}}}]},
{id:"C20",ti:"It's the Desserts",b:[5,6],ex:{base:.9},once:1,sc:"The guide is out. No star — again. The chef stands in the office doorway holding the page like a telegram from a war. Everyone offers theories about the room, the prices, the neighborhood. You believe you know the truth, and the truth wears pastry whites: it's the desserts. It has been the desserts for three years.",ch:[
 {t:"Tell the chef. Straight.",roll:{stat:"half",win:{fx:{R:U.r2,N:U.n1},say:"He stares for a long time at the wall where the star isn't. 'You're the only one who said it to my face.' The pastry section is rebuilt by autumn. The following spring the wall gets its plaque — and you get remembered as the one who diagnosed it."},lose:{fx:{R:-U.r2},say:"The pâtissier is his oldest friend from their first kitchen. You have just handed a grieving man a second grief. The messenger is not shot, exactly — merely stationed, indefinitely, far from anything that matters."}}},
 {t:"Tell the pâtissier instead — gently, cook to cook.",roll:{stat:"N",pivot:45,win:{fx:{N:U.n2},say:"He goes quiet, then opens his notebook to a page of the same suspicions in his own hand. Nobody had said it out loud, so he couldn't either. You spend a winter of Sundays rebuilding the section together, unofficially."},lose:{fx:{N:-U.n1},say:"He hears only the insult and none of the arithmetic. The pastry section becomes a country you need a visa for."}}},
 {t:"Say nothing. Stars come and go.",say:"The theory stays yours. The star stays theoretical. Some truths are only useful spoken; unspoken, they're just weight in a pocket."}]},
{id:"C21",ti:"The Stock Cube Returns",b:[5,8],ex:{base:.6},ga:{flag:"SHORTCUT"},once:1,sc:"Years since Marguerite's doctrine of the cube, and the habit it planted — the invisible corner, cut when tired — has traveled with you like a stone in a boot. Tonight, of all nights, with the room full of people who matter, a sauce goes out built on the shortcut. And someone at table five is eating very, very slowly.",ch:[
 {t:"Pull the batch. Remake it live, at cost, mid-service.",fx:{E:-U.e2,S:U.s2},say:"Eleven minutes of controlled fury and the real thing goes out. Nobody at table five ever knows. You retire the shortcut that night — not out of virtue. Out of the taste of nearly."},
 {t:"Let it ride. It's always been fine.",roll:{stat:"hidden",win:{say:"It's fine. It is, in fact, always fine — which is exactly how the habit survives another decade, patient as rust."},lose:{fx:{R:-U.r2},say:"Table five sets down the fork and asks the waiter one precise question. The answer appears, gently phrased, in a column two Sundays later. Marguerite texts a single emoji."}}}]},
/* ---- BAND D : the pass ---- */
{id:"D1",ti:"The Menu Is Yours",b:[7,8],ex:{base:1.2},once:1,sc:"For the first time, nobody above you has an opinion that counts. The printer is waiting.",ch:[
 {t:"Evolution, not revolution.",fx:{R:U.r1},say:"Safe. Solid. The regulars exhale."},
 {t:"The menu you've written in your head for ten years.",roll:{stat:"S",pivot:62,win:{fx:{R:U.r3},say:"The room gets loud, then full, then booked."},lose:{fx:{R:-U.r2},say:"“Ambitious” — a word critics sharpen."}}}]},
{id:"D2",ti:"Tomas",b:[5,8],ex:{base:.8},once:1,sc:"A stagiaire who does the walk-in at 2 a.m. without being asked, and washes in the right order without being shown. You recognize something. It is your own face, twenty years ago, hungry.",ch:[
 {t:"Train him — properly, the years-long way.",fx:{prot:2,E:-U.e1,flag:"TOMAS"},say:"He stays. He learns. He watches you like a recipe."},
 {t:"Free labor is free.",fx:{Ci:.3},say:"He leaves in spring, for someone who teaches."}]},
{id:"D3",ti:"The Owner's Nephew",b:[7,8],ex:{base:1},sc:"He arrives with his own knives, which is the only professional thing about him.",ch:[
 {t:"Manage him into harmlessness.",fx:{E:-U.e1},say:"Garnish duty. Forever."},
 {t:"Break him in front of the brigade.",fx:{N:U.n1,R:-U.r1},say:"The kitchen laughs. The office doesn't."},
 {t:"Actually teach him.",fx:{E:-U.e2,prot:1},say:"One in five nephews is a person. This one, maybe."}]},
{id:"D4",ti:"V. Books a Table",b:[7,8],ex:{highR:2.5},sc:"Thursday, 20:00, party of two, the name misspelled the way V. always misspells it.",scAlt:{V_KNOWS:"Thursday, 20:00, party of two, the misspelling you'd know anywhere. Somewhere in a drawer you still have the clipping: someone paying attention. Time to prove the sentence had a future tense."},ch:[
 {t:"Cook every plate yourself.",fx:{E:-U.e2},roll:{stat:"S",pivot:60,win:{fx:{R:U.r3},say:"The review uses the word 'conviction'. Bookings double."},lose:{fx:{R:-U.r1},say:"A tired hand shakes. V. sees hands."}}},
 {t:"Trust the brigade.",gate:{teamLife:30},roll:{stat:"team",win:{fx:{R:U.r2,prot:1},say:"They knew he trusted them. It's in the food."},lose:{fx:{R:-U.r1},say:"One plate wobbles. One is enough."}}},
 {t:"Comp, pour, charm.",gate:{N:50},fx:{R:U.r1},say:"V. notices charm and discounts it. Still."}]},
{id:"D5",ti:"The Books",b:[5,8],ex:{base:.8},ga:{N:40},once:1,sc:"By accident, a spreadsheet left open: the restaurant loses money every month you've worked here. The food was never the problem.",ch:[
 {t:"Bring the owner a plan.",fx:{flag:"OPERATOR"},say:"You've seen the machine's insides now. That knowledge compounds."},
 {t:"Stay in your lane.",say:"The lane is comfortable."}]},
{id:"D6",ti:"The Walkout",b:[7,8],ex:{lowE:1.5,lowTeam:2},sc:"Push a brigade past the line long enough and one Friday, between services, four whites are folded on the pass with the aprons on top. It is very quiet.",ch:[
 {t:"Go to the bar where they are. Buy the beer.",fx:{R:-U.r1,N:U.n1},say:"Most return Monday. All of them remember."},
 {t:"Hire through the weekend.",fx:{Ci:-U.ci2},say:"Warm bodies, cold food, expensive lesson."},
 {t:"Cook Saturday with four people.",fx:{E:-U.e3,R:U.r2},say:"The legend of that Saturday outlives everyone in it."}]},
{id:"D7",ti:"The Group's Offer",b:[7,7],ex:{highR:2},once:1,sc:"A hotel group wants an executive chef: triple the money, a laminated org chart, food-cost targets in bold. This is how the top of the ladder usually looks — like a defeat with a salary.",ch:[
 {t:"Take it.",fx:{mod:"promoBonus",Ci:U.ci1},say:"The org chart is laminated. Your name is embroidered. Both feel strange."},
 {t:"Hold out.",say:"Pride has a price, and pays interest. Sometimes."}]},
{id:"D8",ti:"Moonlight Consulting",b:[7,8],ex:{fastC:2,base:.3},sc:"A rival group will pay handsomely for your eyes on their menus — quietly. Head chefs' eyes are the last thing they legally own.",ch:[
 {t:"Consult.",fx:{Ci:U.ci2,E:-U.e1},roll:{stat:"hidden",win:{say:"Quiet money. The quietest kind."},lose:{fx:{R:-U.r1},say:"Word travels. Words always travel."}}},
 {t:"“My eyes are spoken for.”",fx:{R:U.r1},say:"That travels too — the good way."}]},
{id:"D9",ti:"The Food Cost Target",b:[7,8],ex:{base:1},sc:"An email with your name in it and a number in bold: three points off food cost by Q3. Nobody writes how in these emails. How is what they pay you for. Also what they fire you for.",ch:[
 {t:"Cheat the quality.",fx:{Ci:U.ci1},roll:{stat:"hidden",win:{say:"Nobody notices. You notice."},lose:{fx:{R:-U.r2},say:"A regular notices. Regulars are how restaurants die."}}},
 {t:"Find it honestly.",roll:{stat:"S",pivot:60,win:{fx:{Ci:U.ci1,R:U.r1},say:"Waste, cuts, the ugly fish nobody orders. Found."},lose:{fx:{E:-U.e2},say:"Found — the hard, slow way."}}},
 {t:"Refuse.",fx:{R:-U.r1,N:U.n1},say:"The office frowns. The kitchen stands taller."}]},
{id:"D10",ti:"The Four Hands",b:[7,8],ex:{highR:1.5,base:.3},ga:{R:50},sc:"A charity gala: your food beside a name you grew up reading. He turns out to be shorter than his books and kinder than his reputation.",ch:[
 {t:"Cook it.",fx:{R:U.r2,N:U.n2,E:-U.e1},say:"Two hundred plates, four hands, one story you'll tell forever."},
 {t:"Decline.",fx:{E:U.e1},say:"The invitation does not repeat. They rarely do."}]},
{id:"D11",ti:"The Double-Booked Saturday",b:[7,8],ex:{base:.9},sc:"The new reservation system, briefly, believed in two Saturdays. Both are fully booked. There is one room, one kitchen, one you.",ch:[
 {t:"Two seatings, military precision.",roll:{stat:"team",win:{fx:{R:U.r2,Ci:U.ci1},say:"Turn the room like a page. The brigade talks about it for years — the night of two Saturdays."},lose:{fx:{R:-U.r1,E:-U.e2},say:"The seven o'clocks meet the nine o'clocks in the doorway, exchanging looks."}}},
 {t:"Call forty guests and beg.",fx:{N:U.n1,E:-U.e1},say:"Twenty forgive you, ten reschedule, ten become anecdotes at other people's dinner parties."}]},
{id:"D12",ti:"The Allergy",b:[7,8],ex:{base:.9},once:1,sc:"Table eleven, main course, and then the sound a dining room makes when it stops: a guest is reacting — throat, hands, panic — though her ticket says, in your own system's letters, NO NUTS. Somewhere between the ticket and the plate, the word failed.",ch:[
 {t:"Run the protocol yourself — you drilled it for exactly this.",fx:{E:-U.e1},roll:{stat:"team",win:{fx:{R:U.r1,N:U.n1},say:"Antihistamine, position, ambulance called and then waved off gently: it holds at frightening, short of tragic. She writes to you a week later — not a complaint, a thank-you. You laminate the protocol and drill it monthly forever."},lose:{fx:{R:-U.r1},say:"The ambulance takes her; she recovers fully. The room, however, saw everything, and rooms talk. You trace the failure to a smudged ticket and rebuild the allergy chain from scratch, twice."}}},
 {t:"Full transparency: ambulance, then stand in the dining room and own it.",fx:{R:-U.r1,N:U.n2,flag:"SPINE"},say:"You tell forty strangers the truth: our error, being fixed, here is how. It costs a review and buys a reputation among the people who matter — including her family, who come back every year on the anniversary, on purpose."},
 {t:"Quietly establish it was front-of-house's transcription.",roll:{stat:"hidden",win:{say:"It was, technically. The finding stays in the office. The wall between kitchen and floor gains a brick that only you can see."},lose:{fx:{N:-U.n2},say:"The waiter in question keeps the original ticket, which is legible. The building learns you reached for a scapegoat before a solution, and buildings do not forget that order of operations."}}}]},
{id:"D13",ti:"The Dead Salamander",b:[7,8],ex:{base:.8},sc:"Saturday, 9 a.m.: the salamander dies with a click of terrible finality. The engineer's answering service quotes a weekend callout fee with a comedian's timing. Fully booked, twice, and every gratin on the menu just became theoretical.",ch:[
 {t:"Pay the man.",fx:{Ci:-U.ci1},say:"He arrives at four, repairs it in eleven minutes, and charges like a surgeon. You watch the eleven minutes very carefully. Next time — and there is always a next time — it takes you thirteen."},
 {t:"Rewrite tonight's menu around fire, pans, and nerve by 18:00.",roll:{stat:"S",pivot:60,win:{fx:{S:U.s1,R:U.r1},say:"The night without the salamander enters the repertoire: everything seared, glazed, finished in the pan like it's 1970. Two regulars ask if the new style is permanent. You say the salamander will be furious to hear it."},lose:{fx:{E:-U.e2},say:"Improvisation, it turns out, also has a prep list. Service limps home. Sunday you pay the man anyway, at Sunday rates, which have their own comedian."}}},
 {t:"Borrow the bistro's — you know the chef.",gate:{N:35},fx:{N:U.n1},say:"Two commis carry a salamander four hundred meters through a Saturday market, to applause. The bistro eats free for a week at yours. The trade is a village; today the village worked."}]},
{id:"D14",ti:"The Owner's Daughter's Wedding",b:[7,8],ex:{base:.9},once:1,sc:"The owner asks the way owners ask — with a sentence shaped like a question and priced like an order: his daughter's wedding, 180 covers, in a barn, in the hills, in tent-kitchen conditions, in June. The word 'honor' is deployed.",ch:[
 {t:"Take it as the exam it is: field kitchen, full brigade, military planning.",roll:{stat:"team",win:{fx:{R:U.r2,N:U.n2,E:-U.e2},say:"Generators, gas burners, a pass built from trestle tables — and a service so clean the barn forgets it's a barn. The owner cries into your shoulder at midnight. Whatever you ask for, for years, the answer starts at yes."},lose:{fx:{R:-U.r1,E:-U.e3},say:"The generator's opinion of your ovens arrives at 19:40. Courses go out by candlelight and prayer; the toasts run long enough to cover the gaps, barely. The marriage survives. Your June does not."}}},
 {t:"Send the sous to run it; you hold the restaurant.",fx:{N:-U.n1,prot:1},say:"The sous delivers a beautiful wedding and returns two inches taller. The owner, though, wanted your face in the barn, and files the absence under a heading you'll encounter again at contract time."},
 {t:"Yes — conditional on a proper field-kitchen budget, in writing.",roll:{stat:"half",win:{fx:{R:U.r1,Ci:.3},say:"He grumbles and pays. The wedding runs on real equipment and the professional's oldest secret: most heroics are just budget, applied early."},lose:{say:"He pays half and calls the rest 'improvisation allowance.' You improvise. The word 'honor' is deployed twice more."}}}]},
{id:"D15",ti:"The Poaching",b:[7,8],ex:{base:.9},once:1,sc:"A rival opens two streets over — serious backing, serious room — and within a week your three best cooks have offers folded in their aprons: a third more, each. The rival knows exactly whom to ask, which tells you they've eaten here often.",scAlt:{MARG:"Marguerite opens two streets over — of course it's her; the parallel track finally crosses yours. Within a week your three best cooks have her offers folded in their aprons: a third more, each, and a note in her handwriting: 'He'd do the same. Ask him.'"},ch:[
 {t:"Match the money.",fx:{Ci:-U.ci2},say:"All three stay, at a price that repeats every payday. The rival smiles at the trade dinner: raising your costs was, of course, also the plan."},
 {t:"The conversation instead: futures, stations, names on menus.",roll:{stat:"team",win:{fx:{N:U.n2},say:"Two stay for reasons money can't index. The third goes, with your blessing and your stock recipes — some departures are just graduations wearing a coat."},lose:{fx:{prot:1,N:-U.n1},say:"All three go. The kitchen wobbles for a season. Years later, all three send their best young cooks to you first — an academy is a strange thing to discover you've been running."}}},
 {t:"Bless all departures. Publicly. Then promote from the plonge upward.",fx:{prot:2,R:U.r1},say:"The trade paper writes it up: the kitchen that doesn't cage people. Applications triple. The rival got three cooks; you got a reputation that recruits forever."}]},
{id:"D16",ti:"The Card Signed 'A Cook'",b:[7,8],ex:{craft:1.2,base:.5},once:1,sc:"Among the comment cards — the usual weather of 'lovely' and 'parking difficult' — one in careful handwriting takes your menu apart dish by dish. It is precise, unsentimental, and right about at least two things you'd hoped nobody could see. It is signed only: 'a cook.'",ch:[
 {t:"Pin it to the pass.",fx:{S:U.s1,N:U.n1},say:"The brigade debates it for a month like scripture. The two dishes it was right about get rebuilt; the one it was wrong about becomes a point of doctrinal pride. You never learn who wrote it. Every good kitchen has a ghost; yours has excellent handwriting."},
 {t:"Fix the two dishes quietly, tell no one.",fx:{S:U.s2},say:"The corrections go in on a Tuesday, unannounced. Weeks later, a comment card in the same handwriting: one word. 'Better.'"},
 {t:"Bin it.",say:"It goes in the bin and comes back out of it at 3 a.m., occasionally, for years, entirely from memory."}]},
/* ---- BAND E : chef-patron ---- */
{id:"E1",ti:"The Empty Tuesday",b:[9,10],ex:{base:1.2},alt:["Tuesday again, empty again. You have begun to take it personally, which the rent does not.","The Tuesday problem persists. Somewhere, a consultant would charge you the answer; the answer is Tuesdays."],sc:"Full Fridays, dead Tuesdays. The rent does not observe the difference.",ch:[
 {t:"Prix-fixe Tuesdays.",roll:{stat:"half",win:{fx:{Ci:U.ci1},say:"Tuesday finds its people."},lose:{fx:{Ci:-U.ci1},say:"Cheap Tuesday cannibalizes full-price Wednesday. Ask any accountant, afterwards."}}},
 {t:"Close Tuesdays.",fx:{E:U.e1,Ci:-.4},say:"The staff love you. The accountant doesn't."},
 {t:"Wine dinners with faces you know.",gate:{N:50},fx:{Ci:U.ci1,N:U.n1},say:"Twenty people who tell forty people."}]},
{id:"E2",ti:"The Landlord's Letter",b:[9,10],ex:{base:1},sc:"Registered post. The new figure has a comma in a new place.",ch:[
 {t:"Pay.",fx:{Ci:-U.ci2},say:"The comma stays. So do you."},
 {t:"Renegotiate.",gate:{N:55},roll:{stat:"N",pivot:60,win:{say:"A handshake, a compromise, a bottle sent up. The comma retreats."},lose:{fx:{Ci:-U.ci2},say:"The landlord's lawyer eats free elsewhere."}}},
 {t:"Relocate.",fx:{Ci:-U.ci3},roll:{stat:"half",win:{say:"The regulars follow. Habits can move after all."},lose:{fx:{R:-U.r1},say:"Some regulars are married to the room, not the food."}}}]},
{id:"E3",ti:"The Napkin",b:[9,10],ex:{fastC:2.5},once:1,sc:"The Dane orders the tasting menu alone, pays in full, and leaves a napkin with a number on it. The number is generous. Napkin numbers always are — it's the contract underneath that has the weather in it.",ch:[
 {t:"Take the money.",fx:{Ci:U.ci3,flag:"DANE",mod:"hireMinus"},say:"The money is real. So are the strings, though they don't show yet."},
 {t:"Decline.",fx:{flag:"INDEPENDENT",R:U.r1},say:"The trade papers love a refusal. The Dane smiles like a man with time."}]},
{id:"E5",ti:"The Inspector",b:[9,10],ex:{base:1},sc:"Clipboard, gloves, the walk-in, the gap behind the stove that every kitchen on earth has.",ch:[
 {t:"Walk him through it yourself.",roll:{stat:"MQ",win:{say:"Clean sheet. The gap behind the stove keeps its secrets."},lose:{fx:{Ci:-U.ci1,R:-U.r1},say:"A fine, and a notice on the door in municipal yellow."}}}]},
{id:"E6",ti:"The Sous Gets an Offer",b:[9,10],ex:{highMQ:2},sc:"Your best person is wanted elsewhere — the tax on having best people.",ch:[
 {t:"Match the money.",fx:{Ci:-U.ci2,MQ:U.s2},say:"Kept. Money keeps people the way rope keeps boats."},
 {t:"The loyalty conversation.",gate:{teamLife:40},roll:{stat:"team",win:{fx:{MQ:U.s1,N:U.n1},say:"They stay for the reason money can't buy."},lose:{fx:{MQ:-U.s2},say:"They go anyway. It stings double."}}},
 {t:"Bless the departure.",fx:{MQ:-U.s2,prot:2},say:"Your name in their story is worth more than their labor in yours."}]},
{id:"E7",ti:"The Signature Dish",b:[9,10],ex:{rust:2},once:1,sc:"The dish that made your name is now made four hundred times a month by hands that aren't yours — and yesterday, for the first time, it bored you.",ch:[
 {t:"Reinvent it.",roll:{stat:"S",pivot:62,win:{fx:{R:U.r2},say:"“The second act,” V. writes. The room leans in again."},lose:{fx:{R:-U.r1},say:"“Why fix it,” everyone asks, having just been shown why."}}},
 {t:"Leave it alone.",fx:{mod:"repDrip"},say:"Museums are calm places."}]},
{id:"E8",ti:"The Second Kitchen's Bad Night",b:[9,10],ex:{lowMQ:2.5},sc:"Saturday, 21:40, the phone: a furious guest, a screaming printer, your name on the door of a room you're not in. The whole problem of your life now, in one call.",ch:[
 {t:"Drive over. Run the pass yourself.",fx:{E:-U.e2,MQ:U.s2,R:U.r1},say:"The story travels well: the chef who came."},
 {t:"Talk the manager through it.",roll:{stat:"MQ",win:{fx:{MQ:U.s1},say:"They land it. Growth, audible down a phone line."},lose:{say:"Some nights only hands can fix."}}},
 {t:"“Handle it.”",fx:{mod:"scandalWorse"},say:"Two words. They cost nothing tonight."}]},
{id:"E9",ti:"The Regular",b:[9,10],ex:{base:.8},once:1,sc:"Fifteen years at table six, Thursdays. The same order for the last five — her order, since his wife died. His family asks if you would cater the wake. There is only one menu for it, and you already know every course.",ch:[
 {t:"Cook it yourself.",fx:{N:U.n1,E:-U.e1},say:"Thursday will be strange for a while."},
 {t:"Send your best.",fx:{N:U.n1},say:"Some tables you should carry yourself. You'll know that later."}]},
{id:"E10",ti:"The Copycat",b:[9,10],ex:{highR:1.5,base:.3},sc:"A restaurant two towns over is serving your menu. Not inspired-by: verbatim, typos included — which is how you know, since the typo was yours.",ch:[
 {t:"Lawyers.",fx:{Ci:-U.ci1},say:"Lawyers eat first. Always."},
 {t:"Ignore it.",say:"Flattery at scale is just theft with manners."},
 {t:"Invite their chef to dinner.",fx:{N:U.n1,R:U.r1},say:"The story is irresistible, and now it's your story."}]},
{id:"E11",ti:"The Harvest Deal",b:[9,10],ex:{base:.9},sc:"A farmer with soil under his nails offers you everything he grows — first pick, handshake price, no contract. His tomatoes taste like an argument for God.",ch:[
 {t:"Shake the hand.",fx:{Ci:-.5,MQ:U.s2,N:U.n1},say:"The menu now changes when the weather does. This is either a philosophy or a supply problem; some nights both."},
 {t:"Keep the wholesaler.",say:"Reliable, invoiced, tasteless — the tomatoes, that is. Mostly the tomatoes."}]},
{id:"E12",ti:"The Bank Manager's Saturday",b:[9,10],ex:{base:.9},once:1,sc:"Your bank manager calls — himself, no assistant — to ask whether you might have a table this Saturday. The restaurant is fully booked; the waiting list has a waiting list. You spent years on the other end of this exact phone call.",ch:[
 {t:"“For you? Of course.”",fx:{N:U.n2,Ci:U.ci1},say:"A table materializes the way tables do for banks. In spring, your overdraft terms soften by a comma. Nothing is ever said. Everything is understood."},
 {t:"“Saturday is fully booked. Tuesday I'd cook for you myself.”",fx:{R:U.r2},say:"The story escapes, as stories do: even the bank waits. Bookings tick up among exactly the people who enjoy that sentence."},
 {t:"Offer him the kitchen counter — the seat with no menu.",fx:{N:U.n1,R:U.r1,E:-U.e1},say:"He watches service like a man at the opera. He sends people for months, each of whom says the same word: counter."}]},
{id:"E13",ti:"The Minister",b:[9,13],ex:{base:.7},once:1,sc:"A senior member of the cabinet dines long and drinks longer. When the bill arrives he leans in, warm as a stove: “I can do something for you, you know.” The table waits. The room pretends not to.",ch:[
 {t:"Name something.",roll:{stat:"hidden",win:{fx:{Ci:U.ci2},say:"A permit that had been resting for two years wakes up refreshed. You tell yourself it would have happened anyway. You are careful never to check."},lose:{fx:{R:-U.r3},say:"Eighteen months later, a committee hearing, a list of names, yours pronounced carefully. The dinner is described in detail. The wine, unfairly, gets a paragraph."}}},
 {t:"“You can pay the bill, Minister.”",fx:{R:U.r2},say:"He roars with laughter and pays cash. The line follows you around for years, doing quiet good work."},
 {t:"Get him into a car, discreetly.",fx:{N:U.n2},say:"No photographs, no favors, one very grateful chief of staff whose number you now have. Discretion is a currency; you have just been paid in it."}]},
{id:"E14",ti:"The Ketchup",b:[9,13],ex:{highR:1.5,base:.4},once:1,sc:"A television star — a real one, the kind airports slow down for — asks, sweetly, whether he could have ketchup with his main. The waiter transmits the request to the kitchen the way one reports a fire.",ch:[
 {t:"Ketchup. On silver. With ceremony.",fx:{R:U.r1},say:"The little copper pot arrives like a state gift. He posts a photo captioned 'greatest restaurant on earth.' The purists faint; the bookings don't."},
 {t:"Make ketchup. From scratch. In eight minutes.",roll:{stat:"S",pivot:65,win:{fx:{R:U.r2,S:U.s1},say:"Tomato, vinegar, a whisper of clove — plated with a straight face. He declares it the best ketchup of his life, which, infuriatingly, it is."},lose:{fx:{E:-U.e1},say:"Eight minutes was optimistic. He waits; the ketchup arrives shy. He is gracious about it, which is somehow worse."}}},
 {t:"“The kitchen respectfully declines.”",roll:{stat:"half",win:{fx:{R:U.r1},say:"The purists print it on a tote bag. The star, to his eternal credit, laughs and eats everything."},lose:{fx:{R:-U.r1},say:"The story runs as 'chef humiliates beloved actor over condiment.' The condiment gives interviews all week."}}}]},
{id:"E15",ti:"The Deer",b:[9,10],ex:{base:.8},once:1,sc:"A regular calls from his hunting lodge, voice bright with cold air: he has deer — several — and would rather they came to you than to his freezer. Game season has just opened a door.",ch:[
 {t:"Take them. Build the game week.",roll:{stat:"S",pivot:60,win:{fx:{R:U.r2,Ci:U.ci1,E:-U.e1},say:"Venison, juniper, a menu that smells of the forest floor. The week sells out twice — you add a Monday, which is against your religion."},lose:{fx:{E:-U.e2},say:"Butchering three deer is a week of work disguised as a gift. The menu is good. Your shoulders file a grievance."}}},
 {t:"Take them, and hand the butchery to your best knife as a masterclass.",gate:{teamLife:30},fx:{prot:2,N:U.n1},say:"Two days, one carcass diagram in chalk, a kitchen smelling of iron and education. The deer becomes six cooks who can break down anything."},
 {t:"Decline with love.",fx:{N:U.n1},say:"You send him your juniper recipe for the freezer's benefit. He reads it aloud at the lodge, allegedly to the dogs."}]},
{id:"E16",ti:"Table Seven",b:[9,13],ex:{highR:1.5,base:.4},sc:"A murmur crosses the room like weather: is that the famous Japanese influencer at table seven? Forty million followers, one appetite, zero confirmation. The maître d' is sweating in a dignified way.",ch:[
 {t:"Cook exactly as you always cook.",roll:{stat:"half",win:{fx:{R:U.r2},say:"It is her. The post is nine seconds of a spoon and silence, captioned with one word in Japanese. Tokyo calls in the morning. So does everyone else."},lose:{say:"It is a dentist from Osaka with excellent taste and a good coat. She has a lovely evening, which was, after all, the entire point of the building."}}},
 {t:"Send the extra courses. All of them.",roll:{stat:"half",win:{fx:{R:U.r1},say:"She posts the parade of plates with gentle amusement. It reads as generosity. It nearly was."},lose:{fx:{R:-U.r1},say:"The caption translates roughly as: 'they knew.' Forty million people learn the word for 'trying too hard.'"}}}]},
{id:"E17",ti:"The Last Bottle",b:[9,13],ex:{base:.8},once:1,sc:"An unpleasant guest — the kind who says 'your best' instead of a name, and snaps for the sommelier — orders your last bottle of Clos d'Ambonnay 1995. The cellar book confirms it: the last one. He will not taste it. He will only own it, briefly, out loud.",ch:[
 {t:"Sell it. The bottle doesn't know who drinks it.",fx:{Ci:U.ci2},say:"It goes down like an argument he's winning. The sommelier watches from the doorway the way one watches a ship leave with someone on it."},
 {t:"“I'm terribly sorry — the last one broke on Tuesday.”",roll:{stat:"hidden",win:{say:"The bottle sleeps on, saved for someone who will go quiet at the first sip. The sommelier's face during the lie was, itself, a vintage."},lose:{fx:{R:-U.r1,N:-U.n1},say:"He saw it in the cellar book. The scene he makes contains the word 'lawyer' and, somehow, 'Tripadvisor.'"}}},
 {t:"After close, open it with the sommeliers.",fx:{N:U.n2,Ci:-U.ci1},say:"Six glasses in a dark dining room, and the '95 does the thing it was born to do — makes everyone quiet. The most expensive staff meeting in the building's history, and the cheapest loyalty you ever bought."}]},
